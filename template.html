<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>timetrack</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" onload="window.applyEffect&&applyEffect()"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .seg { transition: opacity .12s ease, filter .12s ease, outline .12s ease; cursor: default; }
  .seg:hover { filter: brightness(1.15); outline: 2px solid rgba(255,255,255,.7); outline-offset:-1px; z-index:6; }
  .daycol { transition: background .12s ease; }
  .daycol:hover { background: rgba(255,255,255,.05); }
  .gridline { position:absolute; left:0; right:0; border-top:1px dashed rgba(255,255,255,.10); pointer-events:none; }
  .dim { opacity:.18 !important; }
  .legitem { transition: opacity .12s ease; cursor: default; }
  .tab { transition: all .12s ease; }
  .notch { position:absolute; pointer-events:none; }
  @keyframes ttspin { to { transform: rotate(360deg); } }
  .spin { display:inline-block; width:11px; height:11px; vertical-align:-1px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:ttspin .6s linear infinite; }
  #tip { position:fixed; z-index:50; pointer-events:none; max-width:300px; opacity:0; transition:opacity .08s ease; }
  /* halloween storm: background darkens (content stays lit), drifting fog, lightning, cobweb */
  #storm-dark { position:fixed; inset:0; z-index:0; opacity:1;       /* z:0 sits over #bg(-1) but under content(z-10) */
    background:radial-gradient(circle at 50% 26%, rgba(14,7,30,.5), rgba(2,0,8,.92) 90%); }
  #storm { position:fixed; inset:0; z-index:20; pointer-events:none; overflow:hidden; }   /* foreground: fog + flash + web */
  #storm-flash { position:absolute; inset:0; background:#eef2ff; opacity:0; }
  #storm-bolt { position:absolute; top:-2%; width:64px; opacity:0; filter:drop-shadow(0 0 14px #cde); }
  #cobweb { position:absolute; top:0; right:0; width:300px; height:300px; opacity:.6; transform:scaleX(-1); }   /* traced web, mirrored into the top-right corner */
  /* low fog — beauhaus' codepen technique: a transparent skewed box throws a soft box-shadow band,
     warped into wisps by a turbulence+displacement SVG filter (baseFrequency animated → it roils) */
  .fog { position:absolute; left:-15vw; width:130vw; background:transparent; transform:skew(20deg,0deg);
    filter:url(#fog-filter); will-change:filter; }
  .fog-a { height:90px; bottom:165px; box-shadow:0 200px 26px 0 rgba(206,211,221,.42); }
  .fog-b { height:70px; bottom:95px;  box-shadow:0 175px 22px 0 rgba(206,211,221,.30); }
  /* christmas beach scene */
  #beach { position:fixed; left:0; right:0; bottom:0; height:140px; z-index:5; pointer-events:none; }
  #beach .sand { position:absolute; left:0; right:0; bottom:0; height:78px;
    background:linear-gradient(#ecd9a6,#d9c074); border-top-left-radius:48% 20px; border-top-right-radius:52% 22px; }
  #beach svg { position:absolute; bottom:40px; }
  /* effects opt-out link */
  #fxToggle { position:fixed; bottom:10px; left:12px; z-index:45; font-size:11px; }
  body.matariki { background:#05070f !important; }
  body.matariki #bg { display:none; }
  #stars { position:fixed; inset:0; z-index:-1; pointer-events:none; }
  #stars span { position:absolute; border-radius:50%; background:#fff; box-shadow:0 0 4px 1px rgba(255,255,255,.5); animation:twinkle var(--d,2s) ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.12} 50%{opacity:1} }
</style>

    <div class="flex items-center justify-between mb-5">
      <h2 id="modalTitle" class="text-lg font-semibold text-white"></h2>
      <button onclick="closeModal()" class="text-slate-300 hover:text-white text-sm px-3 py-1.5 rounded-lg hover:bg-white/10">esc ✕</button>

<div id="settings" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-30 flex items-start justify-center overflow-auto py-12 px-4">
  <div class="bg-[#2b3242] border border-white/10 rounded-2xl shadow-2xl w-full max-w-[420px] p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-white">Settings</h2>
      <button onclick="closeSettings()" class="text-slate-300 hover:text-white text-sm px-3 py-1.5 rounded-lg hover:bg-white/10">esc ✕</button>
    </div>
    <div class="space-y-3 text-sm">
      <label class="flex items-center justify-between gap-3" title="Top of the day bar — the start of your framed working day. Activity before it still shows; this just sets where the chart begins.">
        <span class="text-slate-300">Day start <span class="text-slate-500 cursor-help">ⓘ</span></span>
        <input id="cfgStart" type="time" class="bg-[#1c2029] border border-white/10 rounded-lg px-2 py-1 text-slate-100"></label>
      <label class="flex items-center justify-between gap-3" title="Bottom of the day bar — the end of your framed working day. Activity after it still shows; this just sets where the chart ends.">
        <span class="text-slate-300">Day end <span class="text-slate-500 cursor-help">ⓘ</span></span>
        <input id="cfgEnd" type="time" class="bg-[#1c2029] border border-white/10 rounded-lg px-2 py-1 text-slate-100"></label>
      <label class="flex items-center justify-between gap-3" title="When the 'Fit to' toggle is on, your tracked time is scaled to total this much, with meetings held fixed. Your contracted day length.">
        <span class="text-slate-300">Fit-to target <span class="text-slate-500 cursor-help">ⓘ</span></span>
        <input id="cfgFull" type="time" class="bg-[#1c2029] border border-white/10 rounded-lg px-2 py-1 text-slate-100"></label>
      <label class="flex items-center justify-between gap-3" title="How long your last signal keeps counting as active before the day ends. Past days only — today always stops at your last signal.">
        <span class="text-slate-300">End-of-day stretch (min) <span class="text-slate-500 cursor-help">ⓘ</span></span>
        <input id="cfgIdle" type="number" min="0" step="5" class="w-24 bg-[#1c2029] border border-white/10 rounded-lg px-2 py-1 text-slate-100"></label>
      <label class="flex items-center justify-between gap-3" title="When the 'Round to' toggle is on, each timesheet row is rounded to a multiple of this many minutes, still summing to the same total.">
        <span class="text-slate-300">Round to (min) <span class="text-slate-500 cursor-help">ⓘ</span></span>
        <input id="cfgRound" type="number" min="1" step="1" class="w-24 bg-[#1c2029] border border-white/10 rounded-lg px-2 py-1 text-slate-100"></label>
      <label class="flex items-center justify-between gap-3" title="How many weeks back to scan for signals, ending this week. The -w command-line flag overrides this for a single run.">
        <span class="text-slate-300">Weeks to scan <span class="text-slate-500 cursor-help">ⓘ</span></span>
        <input id="cfgWeeks" type="number" min="1" step="1" class="w-24 bg-[#1c2029] border border-white/10 rounded-lg px-2 py-1 text-slate-100"></label>
      <label class="flex items-center justify-between gap-3" title="Your NZ region, for provincial anniversary days. National holidays always show; this just adds the right local anniversary.">
        <span class="text-slate-300">Holiday region <span class="text-slate-500 cursor-help">ⓘ</span></span>
        <select id="cfgRegion" class="bg-[#1c2029] border border-white/10 rounded-lg px-2 py-1 text-slate-100"></select></label>
      <label class="block" title="Meetings whose title contains any of these (one per line, case-insensitive) start switched OFF. They still show on the day — they just don't count until you toggle them on. Good for stand-ups, lunch and focus blocks.">
        <span class="text-slate-300">Meetings off by default <span class="text-slate-500 cursor-help">ⓘ</span></span>
        <textarea id="cfgSkip" rows="4" placeholder="Stand up&#10;Lunch&#10;Focus time" class="mt-1 w-full bg-[#1c2029] border border-white/10 rounded-lg px-2 py-1 text-slate-100 mono text-[12px]"></textarea></label>
    </div>
    <p class="text-[11px] text-slate-500 mt-3">Saves to <span class="mono">config.json</span> and rebuilds.</p>

<script>
/*__TIMETRACK_DATA__*/
const DATA = window.__TIMETRACK__ || {events:[],lanes:{},weeks:[],jiraNames:{},frame:{startMin:480,endMin:1020,idleTailMin:30}};
const FRAME = DATA.frame;
const NAMES = DATA.jiraNames || {};
const REVMETA = DATA.reviewMeta || {};
const REVIEW_LANE = '__github_review__';
// native-tooltip popover with the PR title + author, for review legend entries
function reviewPop(jira){
  const m = jira && REVMETA[jira]; if(!m) return '';
  const txt = (m.title||'') + (m.author?(' — '+m.author):'');
  return txt ? ` title="${txt.replace(/"/g,'&quot;')}"` : '';
}

// ---------- colour ----------
const PALETTE = ['#6ea0ff','#3fd6b6','#f0b04c','#ec7aa0','#9f93ff','#56c6ec','#e07d5c','#8fcc5e','#dd72c8','#6fbcbc','#c79bf0','#eab057'];
const NOJIRA = '#5b6478';
const MEETING = '#b388f0';
const MEETING_PALETTE = ['#b388f0','#e07ad0','#8e9bf0','#c792ea','#f08ab0','#9d7ce0','#d3a4f5','#7e8ce8','#dd8fd6','#a9a0f2'];
const meetingColors = {}; let mIdx = 0;
function meetingColorFor(title){
  if(!(title in meetingColors)) meetingColors[title] = MEETING_PALETTE[mIdx++ % MEETING_PALETTE.length];
  return meetingColors[title];
}
const jiraColors = {}; let colorIdx = 0;
function colorFor(jira){
  if(jira==='__meeting__') return MEETING;
  if(!jira) return NOJIRA;
  if(!(jira in jiraColors)) jiraColors[jira] = PALETTE[colorIdx++ % PALETTE.length];
  return jiraColors[jira];
}
function nameFor(jira){ if(jira==='__meeting__') return 'meeting'; return jira ? (NAMES[jira] || '') : 'no jira'; }

// ---------- timesheet codes (group JIRAs that book to the same code) ----------
let CODES = DATA.jiraCodes || {};                          // real jira -> code (from config.json)
let TT_BYCODE = localStorage.getItem('tt_bycode')==='1';   // roll-up lens, persisted
// custom override names get their own code map, kept in localStorage — they're
// window-scoped and ephemeral, so they never touch the committed-feel config.json.
const CUSTOM_CODES = (()=>{ try { return JSON.parse(localStorage.getItem('tt_customcodes')||'{}'); } catch(e){ return {}; } })();
function saveCustomCodes(){ try { localStorage.setItem('tt_customcodes', JSON.stringify(CUSTOM_CODES)); } catch(e){} }
function codeOf(jira){ return jira ? (CODES[jira] || CUSTOM_CODES[jira] || null) : null; }
const codeColors={}; let codeIdx=0;
// codes draw from the far end of the palette so they're less likely to collide with jira colours
function codeColor(code){ if(!(code in codeColors)) codeColors[code]=PALETTE[PALETTE.length-1-(codeIdx++ % PALETTE.length)]; return codeColors[code]; }
function grouped(jira){ return TT_BYCODE && !!codeOf(jira); }     // folded into a code under the active lens
function groupKey(jira){ return grouped(jira) ? 'code:'+codeOf(jira) : keyOf(jira); }
function effColor(jira){ return grouped(jira) ? codeColor(codeOf(jira)) : colorFor(jira); }
function effLabel(jira){ return grouped(jira) ? codeOf(jira) : jira; }   // null -> caller falls back to lane
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

// ---------- meetings (toggle state persisted in localStorage) ----------
const MSTATE = (()=>{ try { return JSON.parse(localStorage.getItem('tt_meetings')||'{}'); } catch(e){ return {}; } })();
function saveMState(){ try { localStorage.setItem('tt_meetings', JSON.stringify(MSTATE)); } catch(e){} }
function meetingsForDay(date){ return (DATA.meetings||[]).filter(m=>m.date===date).sort((a,b)=>a.startMin-b.startMin); }
function isOn(m){ return (m.id in MSTATE) ? MSTATE[m.id] : m.defaultOn; }
function toggleMeeting(id){
  const m=(DATA.meetings||[]).find(x=>x.id===id); if(!m) return;
  MSTATE[id]=!isOn(m); saveMState();
  if(currentDay) openDay(currentDay);   // refresh modal
  renderWeek();                          // refresh week behind
}
// ---------- overrides (manual entries you carve by hand, per-day, persisted) ----------
// An override overrules the inferred timeline for its span. Today every entry is
// a `break` — "I wasn't working", its span removed from the model entirely (task
// AND meeting time) so totals drop everywhere it counts. (Task/Fixed types, which
// relabel a span instead of blanking it, are layered on next.) Recurring gaps
// aren't a thing here: make a meeting for those.
const BREAKCOL = '#64748b';
// Migrate the old breaks-only store: tt_breaks held untyped {start,end}; tt_overrides
// holds the same with an explicit type. Read the new key if present, else fold the
// old one in as break-type (lazily persisted on the next save).
const OVERRIDES = (()=>{
  try {
    const cur = localStorage.getItem('tt_overrides');
    if(cur) return JSON.parse(cur);
    const old = JSON.parse(localStorage.getItem('tt_breaks')||'{}');
    for(const d in old) old[d] = (old[d]||[]).map(b=>({type:'break', start:b.start, end:b.end}));
    return old;
  } catch(e){ return {}; }
})();
function saveOverrides(){ try { localStorage.setItem('tt_overrides', JSON.stringify(OVERRIDES)); } catch(e){} }
function overridesForDay(date){ return OVERRIDES[date] || []; }   // unsorted — indices stay stable for editing
function snap5(min){ return Math.round(min/5)*5; }
function addOverride(date, startMin){
  const s = Math.max(0, snap5(startMin));
  (OVERRIDES[date] || (OVERRIDES[date]=[])).push({type:'break', start:s, end:s+30});   // default 30 min
  saveOverrides();
}
function updateOverride(date, idx, start, end){ const b=(OVERRIDES[date]||[])[idx]; if(b){ b.start=start; b.end=end; saveOverrides(); } }
function deleteOverride(date, idx){ const l=OVERRIDES[date]; if(!l) return; l.splice(idx,1); if(!l.length) delete OVERRIDES[date]; saveOverrides(); }
function clearOverrides(date){ delete OVERRIDES[date]; saveOverrides(); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function setOverride(date, idx, patch){ const o=(OVERRIDES[date]||[])[idx]; if(o){ Object.assign(o, patch); saveOverrides(); } }
// pick a relabel target (a real ticket via `jira`, or a custom name via `label`).
// promoting a plain break to a labelled entry defaults to Fixed, per the rule that
// a hand-entered duration is an assertion Fit/Round shouldn't reshape.
function chooseTarget(date, idx, patch){
  const o=(OVERRIDES[date]||[])[idx]; if(!o) return;
  setOverride(date, idx, {type:(o.type==='break'?'fixed':o.type), jira:undefined, label:undefined, ...patch});
}
// custom names are only offered for reuse while they're still in the report window
function customNamesInWindow(){
  const set=new Set();
  for(const d in OVERRIDES) for(const o of OVERRIDES[d]) if(o.type!=='break' && o.label) set.add(o.label);
  return [...set].sort();
}
// real tickets that show inferred (non-review) work in the week containing `date`
function ticketsThisWeek(date){
  const w=DATA.weeks.find(x=>x.days.some(d=>d.date===date)); if(!w) return [];
  const set=new Set();
  for(const d of w.days){ const m=dayModel(d.date); if(m) for(const s of m.segs){ if(s.jira && s.lane!==REVIEW_LANE) set.add(s.jira); } }
  return [...set].sort();
}

// meetings win during their slot; task timeline underneath resumes after
function overlay(baseSegs, date){
  let segs = baseSegs.map(s=>({...s}));
  for(const mt of meetingsForDay(date)){
    if(!isOn(mt)) continue;
    const out=[];
    for(const s of segs){
      if(s.end<=mt.startMin || s.start>=mt.endMin){ out.push(s); continue; }
      if(s.start<mt.startMin) out.push({...s,end:mt.startMin});
      if(s.end>mt.endMin)     out.push({...s,start:mt.endMin});
    }
    out.push({start:mt.startMin,end:mt.endMin,meeting:true,title:mt.title,id:mt.id,jira:'__meeting__'});
    segs=out;
  }
  // overrides overrule everything underneath (task AND meeting) for their span: a
  // break carves and inserts nothing; a task/fixed carves and drops in a relabel
  // seg keyed by its target (a real ticket id, or a custom name used as identity).
  for(const o of overridesForDay(date)){
    const out=[];
    for(const s of segs){
      if(s.end<=o.start || s.start>=o.end){ out.push(s); continue; }
      if(s.start<o.start) out.push({...s,end:o.start});
      if(s.end>o.end)     out.push({...s,start:o.end});
    }
    const ident = o.jira || o.label;
    if(o.type!=='break' && ident){
      out.push({start:o.start, end:o.end, jira:ident, lane:'__override__',
                override:true, fixed:o.type==='fixed', custom:!o.jira});
    }
    segs=out;
  }
  return segs.sort((a,b)=>a.start-b.start);
}
// resolved-view ONLY (display, never totals): coalesce abutting same-jira blocks
// — e.g. one ticket worked across two worktrees — into a single seamless block.
function mergeSameJira(segs){
  const out=[];
  for(const s of segs){
    const last=out[out.length-1];
    if(last && !last.meeting && !s.meeting && groupKey(last.jira)===groupKey(s.jira) && s.start<=last.end){
      last.end=Math.max(last.end,s.end);
      if(s.events) last.events=(last.events||[]).concat(s.events);
    } else out.push({...s, events:(s.events?s.events.slice():s.events)});
  }
  for(const s of out){ if(s.events&&s.events.length){ s.events=s.events.slice().sort((a,b)=>a.minute-b.minute); s.init=s.events[0]; } }
  return out;
}
// overlapping/stacked breaks collapse to one contiguous gap (display only)
function mergedBreaks(date){
  const list=overridesForDay(date).filter(o=>o.type==='break').sort((a,b)=>a.start-b.start), out=[];
  for(const b of list){ const last=out[out.length-1];
    if(last && b.start<=last.end) last.end=Math.max(last.end,b.end); else out.push({start:b.start,end:b.end}); }
  return out;
}
function frameFor(date, base){
  let s = base?base.frameStart:FRAME.startMin, e = base?base.frameEnd:FRAME.endMin;
  for(const mt of meetingsForDay(date)){ if(isOn(mt)){ s=Math.min(s,mt.startMin); e=Math.max(e,mt.endMin); } }
  for(const o of overridesForDay(date)){ s=Math.min(s,o.start); e=Math.max(e,o.end); }
  return {frameStart:s, frameEnd:e};
}
// ---------- timesheet adjustments (fit to 7:30 / round to 15m) ----------
const FULL_DAY = DATA.timesheet?.fullDayMin ?? 450, QUARTER = DATA.timesheet?.roundToMin ?? 15;
let TT_FIT   = localStorage.getItem('tt_fit')==='1';
let TT_ROUND = localStorage.getItem('tt_round')==='1';
let TT_OMIT  = localStorage.getItem('tt_omit')==='1';   // drop "no jira" before fit/round

// largest-remainder apportionment: round each value to a multiple of QUARTER
// so the rounded values sum exactly to `target`. One strategy, fit or no fit.
function distribute(vals, target){
  const tq = Math.round(target/QUARTER);
  const floors = vals.map(v=>Math.floor(v/QUARTER));
  let rem = tq - floors.reduce((a,b)=>a+b,0);
  const order = vals.map((v,i)=>({i, frac:(v/QUARTER)-floors[i]})).sort((a,b)=>b.frac-a.frac);
  const out = floors.slice();
  for(let k=0; k<order.length && rem>0; k++){ out[order[k].i]++; rem--; }
  for(let k=order.length-1; k>=0 && rem<0; k--){ if(out[order[k].i]>0){ out[order[k].i]--; rem++; } }
  return out.map(q=>q*QUARTER);
}

function applyAdjust(items){
  let arr = items.map(it=>({...it}));
  // Fixed items (locked manual durations) are held exactly: Fit scales only the
  // flexible pool around them, and Round leaves their minutes alone. The day total
  // can therefore land a touch off 7:30 / a 15-min grid when a fixed block isn't a
  // tidy multiple — that's the honest cost of "don't shrink my time".
  if(TT_FIT){
    const fixedM = arr.filter(i=>i.fixed).reduce((s,i)=>s+i.mins,0);
    const mt = arr.filter(i=>i.meeting).reduce((s,i)=>s+i.mins,0);
    const flex = arr.filter(i=>!i.meeting && !i.fixed).reduce((s,i)=>s+i.mins,0);
    const target = Math.max(0, FULL_DAY - mt - fixedM);
    if(flex>0){ const f=target/flex; arr.forEach(i=>{ if(!i.meeting && !i.fixed) i.mins*=f; }); }
  }
  if(TT_ROUND){
    const rest = arr.filter(i=>!i.fixed);
    const fixedM = arr.filter(i=>i.fixed).reduce((s,i)=>s+i.mins,0);
    const restSum = rest.reduce((s,i)=>s+i.mins,0);
    const target = TT_FIT ? Math.max(0, FULL_DAY - fixedM) : Math.round(restSum/QUARTER)*QUARTER;
    const q = distribute(rest.map(i=>i.mins), target);
    rest.forEach((it,idx)=> it.mins=q[idx]);
  }
  return arr.filter(i=>i.mins>0).sort((a,b)=>b.mins-a.mins);
}

// timesheet rows for a day: each jira/no-jira + each attended meeting, with time
function daySummary(date, segs){
  // group by the active lens: by code when grouping, else by jira
  const grp={};   // groupKey -> {mins, jira(sample), code, worked, fixed}
  for(const s of segs){ if(s.meeting) continue;
    const gk=(s.fixed?'fix:':'')+groupKey(s.jira);   // fixed stands apart so its locked time never merges with flexible work
    const g=grp[gk] || (grp[gk]={mins:0, jira:s.jira, code:(grouped(s.jira)?codeOf(s.jira):null), worked:false, fixed:!!s.fixed, custom:!!s.custom});
    g.mins+=(s.end-s.start);
    if(s.lane!==REVIEW_LANE && s.jira) g.worked=true;
  }
  const raw=[];
  for(const gk in grp){ const g=grp[gk];
    if(g.code) raw.push({key:gk, label:g.code, sub:'code', color:codeColor(g.code), mins:g.mins, reviewOnly:!g.worked, fixed:g.fixed});
    else { const jira=g.jira;
      raw.push({key:gk, label:(jira||'no jira'), sub:(jira?nameFor(jira):''), color:colorFor(jira), mins:g.mins,
                reviewOnly: !!jira && !g.worked, fixed:g.fixed}); }
  }
  const mtgs=meetingsForDay(date);
  for(const mt of mtgs){ if(!isOn(mt)) continue;
    raw.push({key:'__meeting__', label:mt.title, sub:'', color:meetingColorFor(mt.title), mins:mt.endMin-mt.startMin, meeting:true}); }
  // drop "no jira" first, so Fit redistributes its time into the real jiras (still 7:30)
  const pool = TT_OMIT ? raw.filter(it=>it.key!=='__none__') : raw;
  const items = applyAdjust(pool);
  return {items, things:Object.keys(grp).length, attended:mtgs.filter(isOn).length, total:mtgs.length,
          totalMins:items.reduce((s,i)=>s+i.mins,0)};
}
function resetToggles(){
  for(const k in MSTATE) delete MSTATE[k];
  saveMState(); renderWeek(); if(currentDay) openDay(currentDay);
}
function refreshAll(){ renderAdjust(); renderWeek(); renderLegend(); if(currentDay) openDay(currentDay); }
// served over http:// by `timetrack --serve`? then the Regenerate button can re-grep
const SERVED = location.protocol==='http:' || location.protocol==='https:';
let SETUP_STATE = null;   // last /setup-status, for the toolbar button + muting
function loadSetupState(){
  if(!SERVED) return;
  fetch('/setup-status').then(r=>r.json()).then(s=>{ SETUP_STATE=s; renderAdjust(); }).catch(()=>{});
}
// disable a button and show a spinner + label while an async action runs
function busy(btn, label){ if(btn){ btn.disabled=true; btn.innerHTML=`<span class="spin"></span> ${label}`; } }
function unbusy(btn, label){ if(btn){ btn.disabled=false; btn.textContent=label; } }
// catch-up block was clicked: show a spinner in the block itself (the toolbar
// Regenerate button is easy to miss) before kicking off the re-scan.
function catchUp(el){
  if(el){
    el.onclick=null; el.style.cursor='default'; el.style.background='rgba(96,165,250,.18)';
    el.innerHTML=`<span class="spin" style="border-color:rgba(147,197,253,.35);border-top-color:rgba(147,197,253,.95)"></span>
      <span class="text-[9px] font-semibold leading-tight truncate px-1" style="color:rgba(147,197,253,.95)">catching up…</span>`;
  }
  regenerate();
}
function regenerate(){
  const b=document.getElementById('tRegen'); if(!b) return;
  busy(b,'Regenerating…');
  fetch('/regenerate').then(r=>{ if(!r.ok) throw new Error('bad'); return r.json(); })
    .then(()=>location.reload())
    .catch(()=>{ unbusy(b,'↻ Regenerate'); alert('Regenerate failed — is the server still running?'); });
}
const fitLabel = Math.floor(FULL_DAY/60)+':'+String(FULL_DAY%60).padStart(2,'0');
function renderAdjust(){
  const el=document.getElementById('adjust'); if(!el) return;
  const pill=(on)=> on?'bg-blue-500 border-blue-400 text-white':'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10';
  const note = TT_FIT ? `scaled to ${fitLabel} (meetings fixed)` : '';
  const setupDone = SETUP_STATE && SETUP_STATE.focus.linked && SETUP_STATE.review.registered;
  const setupBtn = setupDone
    ? `<button id="tSetup" class="tab px-3 py-1 rounded-lg border bg-transparent border-white/5 text-slate-500 hover:bg-white/5" title="Integrations — all set up">✓ Setup</button>`
    : `<button id="tSetup" class="tab px-3 py-1 rounded-lg border font-medium bg-white/5 border-white/10 text-slate-300 hover:bg-white/10" title="Integrations status &amp; setup">🔌 Setup</button>`;
  const right = SERVED
    ? `<span class="flex-1"></span>
       ${setupBtn}
       <button id="tSettings" class="tab px-3 py-1 rounded-lg border font-medium bg-white/5 border-white/10 text-slate-300 hover:bg-white/10" title="Edit preferences">⚙ Settings</button>
       <button id="tRegen" class="tab px-3 py-1 rounded-lg border font-medium bg-white/5 border-white/10 text-slate-300 hover:bg-white/10" title="Re-scan the signal sources">↻ Regenerate</button>`
    : `<span class="flex-1"></span>
       <span class="px-3 py-1 rounded-lg border font-medium bg-white/5 border-white/10 text-slate-300">tip: run <span class="mono text-slate-100">timetrack --serve</span> to keep this tab live with Setup, Settings &amp; Regenerate</span>`;
  el.innerHTML = `<span class="text-slate-400 mr-1 font-medium">Timesheet:</span>
    <button id="tOmit" class="tab px-3 py-1 rounded-lg border font-medium ${pill(TT_OMIT)}">Omit no-JIRA</button>
    <button id="tFit" class="tab px-3 py-1 rounded-lg border font-medium ${pill(TT_FIT)}">Fit to ${fitLabel}</button>
    <button id="tRound" class="tab px-3 py-1 rounded-lg border font-medium ${pill(TT_ROUND)}">Round to ${QUARTER}m</button>
    <button id="tCode" class="tab px-3 py-1 rounded-lg border font-medium ${pill(TT_BYCODE)}" title="Roll JIRAs up into their timesheet codes">By timecode</button>
    ${note?`<span class="text-slate-400 ml-1">${note}${TT_ROUND?` · ${QUARTER}-min chunks`:''}</span>`:(TT_ROUND?`<span class="text-slate-400 ml-1">${QUARTER}-min chunks</span>`:'')}<span id="codeHint" class="hidden text-amber-300/90 text-xs ml-2"></span>${right}`;
  if(SERVED){ document.getElementById('tSetup').onclick=openSetup; document.getElementById('tSettings').onclick=openSettings; document.getElementById('tRegen').onclick=regenerate; }
  document.getElementById('tOmit').onclick=()=>{ TT_OMIT=!TT_OMIT; localStorage.setItem('tt_omit',TT_OMIT?'1':'0'); refreshAll(); };
  document.getElementById('tFit').onclick=()=>{ TT_FIT=!TT_FIT; localStorage.setItem('tt_fit',TT_FIT?'1':'0'); refreshAll(); };
  document.getElementById('tRound').onclick=()=>{ TT_ROUND=!TT_ROUND; localStorage.setItem('tt_round',TT_ROUND?'1':'0'); refreshAll(); };
  const tc=document.getElementById('tCode'); if(tc) tc.onclick=()=>{
    if(!TT_BYCODE && existingCodes().length===0){ flashCodeHint(); return; }
    TT_BYCODE=!TT_BYCODE; localStorage.setItem('tt_bycode',TT_BYCODE?'1':'0'); refreshAll();
  };
}
function flashCodeHint(){
  const h=document.getElementById('codeHint'); if(!h) return;
  h.textContent = SERVED
    ? 'No timecodes yet — click a ticket chip in the legend or a day’s breakdown to tag it with a code.'
    : 'No timecodes yet — add them under "jira_codes" in config.json.';
  h.classList.remove('hidden');
  clearTimeout(flashCodeHint._t);
  flashCodeHint._t = setTimeout(()=>{ const e=document.getElementById('codeHint'); if(e) e.classList.add('hidden'); }, 6000);
}
// ---------- Setup / integrations panel (serve mode) ----------
function openSetup(){ document.getElementById('setup').classList.remove('hidden'); refreshSetup(); }
function closeSetup(){ document.getElementById('setup').classList.add('hidden'); }
function setupAgo(ep){
  if(!ep) return 'never';
  const s = Math.floor(Date.now()/1000) - ep;
  if(s<90) return 'just now';

// ---------- per-day model (latest-wins attention) ----------
function dayEvents(date){ return DATA.events.filter(e=>e.date===date).sort((a,b)=>a.minute-b.minute); }
function dayModel(date){
  const evs = dayEvents(date);
  if(!evs.length) return null;
  // Today is still in progress: the 30-min idle tail would invent time past now,
  // so only past days get it — today ends exactly at the last signal.
  const idle = (date === DATA.window?.end) ? 0 : FRAME.idleTailMin;
  const activeStart = evs[0].minute;
  const activeEnd = evs[evs.length-1].minute + idle;
  let raw=[];
  for(let i=0;i<evs.length;i++){
    const start=evs[i].minute, end=(i<evs.length-1)?evs[i+1].minute:activeEnd;
    if(end<=start) continue;
    raw.push({start,end,lane:evs[i].lane,jira:evs[i].jira,branch:evs[i].branch});
  }
  const merged=[];
  for(const s of raw){
    const last=merged[merged.length-1];
    if(last && last.lane===s.lane && last.jira===s.jira) last.end=s.end;
    else merged.push({...s});
  }
  for(const s of merged){
    s.events = evs.filter(e=>e.lane===s.lane && e.minute>=s.start && e.minute<s.end);
    s.init = s.events[0] || null;
  }
  const totals={};
  for(const s of merged){ const k=s.jira||'(no jira)'; totals[k]=(totals[k]||0)+(s.end-s.start); }
  return {date,activeStart,activeEnd,segs:merged,evs,totals,
          frameStart:Math.min(FRAME.startMin,activeStart),
          frameEnd:Math.max(FRAME.endMin,activeEnd)};
}

// ---------- bar rendering ----------
const BAR_H = 380;
function yFor(min,m){ return (min-m.frameStart)/(m.frameEnd-m.frameStart)*BAR_H; }

// registry for instant tooltips
let TIP = [];
function barHTML(m, segs, widthStyle, opts={}){
  const detail = !!opts.detail;
  let h = `<div class="relative rounded-lg bg-[#252c3b] border border-white/10 overflow-hidden" style="height:${BAR_H}px;${widthStyle||'width:100%'}">`;
  for(let hr=Math.ceil(m.frameStart/60); hr*60<=m.frameEnd; hr++){ h+=`<div class="gridline" style="top:${yFor(hr*60,m)}px"></div>`; }
  for(const s of segs){
    const top=yFor(s.start,m), height=Math.max(2,yFor(s.end,m)-top);
    const label = esc(s.meeting ? s.title : (effLabel(s.jira)||laneShort(s.lane)));
    const segColor = s.meeting ? meetingColorFor(s.title) : effColor(s.jira);
    const stripe = s.meeting ? 'background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.20) 0 5px,transparent 5px 10px);' : '';
    const textCol = s.meeting ? 'rgba(0,0,0,.72)' : textOn(s.jira);
    let attrs = `data-jira="${esc((s.fixed?'fix:':'')+groupKey(s.jira))}"`;
    if(detail){ const idx=TIP.push(s)-1; attrs += ` data-tip="${idx}"`; }
    else { attrs += ` title="${label} · ${fmt(s.start)}–${fmt(s.end)} · ${dur(s.end-s.start)}"`; }
    h+=`<div class="seg absolute rounded-[3px]" ${attrs}
         style="top:${top}px;height:${height}px;left:3px;right:3px;background:${segColor};${stripe}">
         ${height>15?`<span class="text-[9px] font-semibold pl-1 leading-tight block truncate" style="color:${textCol}">${label}</span>`:''}</div>`;
  }
  // breaks: a faint hatched ghost so a carved hole is never a mystery (purely visual)
  if(opts.breaks){
    for(const b of opts.breaks){
      const top=yFor(b.start,m), height=Math.max(2,yFor(b.end,m)-top);
      h+=`<div class="absolute rounded-[3px] pointer-events-none"
           style="top:${top}px;height:${height}px;left:3px;right:3px;z-index:6;background-image:repeating-linear-gradient(45deg,rgba(148,163,184,.20) 0 5px,transparent 5px 10px);border:1px dashed rgba(148,163,184,.4)">
           ${height>15?`<span class="text-[9px] font-semibold pl-1 leading-tight block truncate" style="color:rgba(148,163,184,.85)">break</span>`:''}</div>`;
    }
  }
  // today only (served): a clickable gap from the last signal to now — re-scans signals.
  // only drawn when tall enough to fit its own label, per the "big enough" rule.
  if(opts.live && opts.live.to>opts.live.from){
    const lt=yFor(opts.live.from,m), lh=yFor(opts.live.to,m)-lt;
    if(lh>=16){
      h+=`<div onclick="event.stopPropagation(); catchUp(this)" title="catch up to now — re-scan the signal sources"
           class="absolute rounded-[3px] cursor-pointer flex items-center justify-center"
           style="top:${lt}px;height:${lh}px;left:3px;right:3px;z-index:7;background:rgba(96,165,250,.10);border:1px dashed rgba(96,165,250,.55)">
           <span class="text-[9px] font-semibold leading-tight truncate px-1" style="color:rgba(147,197,253,.95)">↻ catch up</span></div>`;
    }
  }
  if(detail && opts.events){
    // passive, dense signals (iTerm focus + GitHub review) → thin red lines, behind
    for(const e of opts.events){
      if(e.type!=='focus' && e.type!=='review') continue;
      const y=yFor(e.minute,m);
      h+=`<div class="absolute pointer-events-none" title="${fmt(e.minute)} ${typeLabel(e.type)}"
           style="top:${y}px;left:0;width:6px;height:1.5px;z-index:5;background:rgba(239,68,68,.85)"></div>`;
    }
    // deliberate signals (prompt, checkout) → markers, always on top of the red lines
    for(const e of opts.events){
      if(e.type==='focus' || e.type==='review') continue;
      const y=yFor(e.minute,m);
      const bubble = e.type==='prompt';  // tiny speech bubble for prompts, diamond for checkouts
      const shape = bubble
        ? 'width:9px;height:7px;border-radius:3px 3px 3px 0'
        : 'width:8px;height:8px;transform:rotate(45deg)';
      h+=`<div class="notch" title="${fmt(e.minute)} ${typeLabel(e.type)}"
           style="top:${y-4}px;right:2px;z-index:8;${shape};background:#fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.75)"></div>`;
    }
  }
  return h+`</div>`;
}

function hourAxis(m, leftPad=false){
  let h=`<div class="relative mono text-[10px] text-slate-400" style="height:${BAR_H}px;width:${leftPad?42:34}px">`;

    h+=`<div class="absolute right-1" style="top:${yFor(hr*60,m)-6}px">${String(hr).padStart(2,'0')}:00</div>`;
  }

}

function renderWeek(){
  const w = DATA.weeks.find(x=>x.iso===currentWeek);
  if(!w){ document.getElementById('week').innerHTML='<p class="text-slate-400">No data.</p>'; return; }
  const cells = w.days.map(d=>{
    const m = dayModel(d.date);
    const segs = overlay(m?m.segs:[], d.date);
    return {d, m, segs, fr:frameFor(d.date, m), has: !!m || segs.length>0};
  });
  const act = cells.filter(c=>c.has);
  const fStart = act.length?Math.min(...act.map(c=>c.fr.frameStart)):FRAME.startMin;
  let   fEnd   = act.length?Math.max(...act.map(c=>c.fr.frameEnd)):FRAME.endMin;
  // current week, served mode: stretch the axis to "now" so today's bar can show
  // a clickable catch-up gap from the last signal down to the current time.
  // If the page is stale (built on an earlier day than the real one), the build
  // day's gap runs to midnight instead of wrapping past it, and every day since
  // — including the real today, which the build never scanned — gets its own
  // catch-up block, since none of them carry any frozen event data.
  const REAL_TODAY = SERVED ? todayISO() : null;
  const BUILD_TODAY = DATA.window?.end;
  const buildCell = (REAL_TODAY && BUILD_TODAY) ? cells.find(c=>c.d.date===BUILD_TODAY && c.m) : null;
  const liveTo = buildCell ? (REAL_TODAY===BUILD_TODAY ? nowMin() : 1440) : null;
  if(liveTo!=null) fEnd = Math.max(fEnd, liveTo);
  const shared = {frameStart:fStart, frameEnd:fEnd};
  const isMissingDay = d => !!(REAL_TODAY && BUILD_TODAY && REAL_TODAY>BUILD_TODAY && d.date>BUILD_TODAY && d.date<=REAL_TODAY);

  // axis gets an invisible header matching the day-column header so the hour
  // lines align with the bars, not the column tops
  const axisHead = `<div><div class="text-center mb-2 invisible" aria-hidden="true"><div class="text-xs font-semibold">M</div><div class="text-[10px] mono">x</div><div class="text-[10px] mt-0.5">x</div></div>${hourAxis(shared)}</div>`;
  let html = `<div class="flex gap-3 items-start">${axisHead}<div class="flex gap-3 flex-1">`;
  for(const c of cells){
    const d=c.d;
    const sum = c.has ? daySummary(d.date, c.segs) : null;
    const hol = holidayName(d.date), worked = isWorked(d.date), festive = hol && !worked;
    const theme = hol ? holidayTheme(hol) : null;
    const holBadge = hol ? `<div onclick="event.stopPropagation(); toggleWorked('${d.date}')"
        title="${hol}${worked?' — marked as worked, click to restore the day off':' — click if you actually worked this day'}"
        class="mt-0.5 text-[10px] flex items-center justify-center gap-1 cursor-pointer ${worked?'opacity-40 line-through':'text-amber-200'}">
        <span>${theme.icon}</span><span class="truncate">${hol}</span></div>` : '';
    const isNowToday = REAL_TODAY ? d.date===REAL_TODAY : d.isToday;
    html += `<div class="daycol flex-1 min-w-0 rounded-xl p-2 cursor-pointer ${isNowToday?'ring-1 ring-blue-400/50':''} ${festive?'bg-amber-400/5':''}" onclick="openDay('${d.date}')">
      <div class="text-center mb-2">
        <div class="text-xs font-semibold ${isNowToday?'text-blue-300':'text-slate-200'}">${d.weekday.slice(0,3)}</div>
        <div class="text-[10px] text-slate-400 mono">${d.short.replace(/^\w+\s/,'')}</div>
        ${sum?`<div class="text-[10px] text-slate-400 mt-0.5">${sum.things} item${sum.things===1?'':'s'}${sum.total?` · ${sum.attended}/${sum.total} mtgs`:''}</div>`:'<div class="text-[10px] text-slate-600 mt-0.5">·</div>'}
        ${holBadge}</div>`;
    if(c.has){
      const live = (liveTo!=null && d.date===BUILD_TODAY && c.m) ? {from:c.m.activeEnd, to:liveTo} : null;
      html += `<div class="flex justify-center">${barHTML(shared, mergeSameJira(c.segs), 'width:100%', {breaks:mergedBreaks(d.date), live})}</div>`;
      html += `<div class="text-center text-base text-white mono mt-2 font-bold tracking-tight">${dur(sum.totalMins)}</div>`;
      html += `<div class="mt-2.5 space-y-2">${sum.items.map(it=>`
        <div class="legitem text-[11px]" data-jira="${esc(it.key)}">
          <div class="flex items-baseline gap-1.5">
            <span class="w-2.5 h-2.5 rounded-sm shrink-0 self-center" style="background:${it.color}"></span>
            <span class="truncate flex-1 min-w-0 ${it.meeting?'text-slate-300':'text-slate-100'} font-medium" title="${esc(it.label)}${it.sub?(' — '+esc(it.sub)):''}${it.reviewOnly?' — code review':''}">${esc(it.label)}</span>
            ${it.reviewOnly?'<span class="text-[8px] uppercase tracking-wide px-1 rounded bg-white/15 text-slate-200 shrink-0">review</span>':''}
            <span class="mono font-bold text-white shrink-0 text-xs">${dur(it.mins)}</span>
          </div>
          ${it.sub?`<div class="text-[10px] text-slate-400 truncate leading-tight" style="padding-left:18px" title="${it.sub}">${it.sub}</div>`:''}
        </div>`).join('')}</div>`;
    } else if(festive){
      html += `<div class="rounded-lg border border-amber-300/25 bg-amber-400/5 flex flex-col items-center justify-center gap-1.5 text-center px-1" style="height:${BAR_H}px">
                 <div style="font-size:34px;line-height:1">${theme.icon}</div>
                 <div class="text-[11px] text-amber-200 font-medium leading-tight">${hol}</div>
                 <div class="text-[10px] text-slate-500">day off</div>
                 <button onclick="event.stopPropagation(); toggleWorked('${d.date}')" class="mt-1 text-[9px] px-2 py-0.5 rounded border border-white/10 text-slate-400 hover:bg-white/10">I worked this day</button>
               </div>
               <div class="text-center text-[10px] text-slate-600 mono mt-1.5">·</div>`;
    } else if(isMissingDay(d)){
      html += `<div onclick="event.stopPropagation(); catchUp(this)" title="catch up to now — re-scan the signal sources"
                 class="rounded-lg cursor-pointer flex items-center justify-center"
                 style="height:${BAR_H}px;background:rgba(96,165,250,.10);border:1px dashed rgba(96,165,250,.55)">
                 <span class="text-[10px] font-semibold" style="color:rgba(147,197,253,.95)">↻ catch up</span></div>
               <div class="text-center text-[10px] text-slate-600 mono mt-1.5">·</div>`;
    } else {
      html += `<div class="rounded-lg bg-[#252c3b] border border-dashed border-white/10 flex items-center justify-center text-slate-600 text-[10px]" style="height:${BAR_H}px">—</div>
               <div class="text-center text-[10px] text-slate-600 mono mt-1.5">·</div>`;
    }
    html += `</div>`;
  }
  document.getElementById('week').innerHTML = html + `</div></div>`;
  wireHover();
}

// ---------- drill-down ----------
let currentDay = null;
let MIDX = [];
function meetingColHTML(date, mf){
  let h=`<div class="relative rounded-lg bg-[#252c3b] border border-white/10 overflow-hidden" style="height:${BAR_H}px;width:118px">`;
  for(let hr=Math.ceil(mf.frameStart/60); hr*60<=mf.frameEnd; hr++){ h+=`<div class="gridline" style="top:${yFor(hr*60,mf)}px"></div>`; }
  for(const mt of meetingsForDay(date)){
    const on=isOn(mt), top=yFor(mt.startMin,mf), height=Math.max(3,yFor(mt.endMin,mf)-top);
    const col=meetingColorFor(mt.title);
    const idx=MIDX.push(mt)-1;
    const tipIdx=TIP.push({meeting:true,title:mt.title,start:mt.startMin,end:mt.endMin,busy:mt.busy,on})-1;
    const fill = on
      ? `background:${col};background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.20) 0 5px,transparent 5px 10px);`
      : `background:transparent;border:1px dashed ${col};opacity:.5;`;
    h+=`<div data-mid="${idx}" data-tip="${tipIdx}" data-jira="__meeting__" class="seg absolute rounded-[3px] cursor-pointer"
         style="top:${top}px;height:${height}px;left:3px;right:3px;${fill}">
         ${height>15?`<span class="text-[9px] font-semibold pl-1 leading-tight block truncate" style="color:${on?'rgba(0,0,0,.72)':col}">${mt.title}</span>`:''}</div>`;
  }
  return h+`</div>`;
}

// ---------- overrides column (click empty to add · drag to move · drag bottom to resize) ----------
function overrideColHTML(date, mf){
  let h=`<div id="ovrCol" class="relative rounded-lg bg-[#252c3b] border border-white/10 overflow-hidden cursor-copy" style="height:${BAR_H}px;width:118px">`;
  for(let hr=Math.ceil(mf.frameStart/60); hr*60<=mf.frameEnd; hr++){ h+=`<div class="gridline" style="top:${yFor(hr*60,mf)}px"></div>`; }
  overridesForDay(date).forEach((b,idx)=>{
    const top=yFor(b.start,mf), height=Math.max(6,yFor(b.end,mf)-top);
    const isBreak=b.type==='break', ident=b.jira||b.label||'';
    const col=isBreak?BREAKCOL:(ident?colorFor(ident):BREAKCOL);
    const stripe=isBreak?'background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.18) 0 5px,transparent 5px 10px);':'';
    const ring=b.type==='fixed'?'box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.6);':'';   // a locked look for Fixed
    const lab=isBreak?'break':(ident||'pick…'), txt=isBreak?'rgba(255,255,255,.92)':textOn(ident);
    h+=`<div class="ovr absolute rounded-[3px] cursor-grab" data-oidx="${idx}" title="click to edit"
         style="top:${top}px;height:${height}px;left:3px;right:3px;background:${col};${stripe}${ring}touch-action:none">
         <button class="ovr-x absolute top-0 right-0 leading-none text-[11px] px-1 text-white/80 hover:text-white" title="delete">✕</button>
         ${height>16?`<span class="text-[9px] font-semibold pl-1 leading-tight block truncate" style="color:${txt}">${esc(lab)}</span>`:''}
         <div class="ovr-handle" style="position:absolute;left:0;right:0;bottom:0;height:7px;cursor:ns-resize"></div></div>`;
  });
  return h+`</div>`;
}
function minFromY(el, clientY, mf){ const r=el.getBoundingClientRect(); return mf.frameStart + (clientY-r.top)/r.height*(mf.frameEnd-mf.frameStart); }
function showOverrideLabel(o,x,y){
  const ident=o.jira||o.label, head=o.type==='break'?'break':((o.type==='fixed'?'fixed':'task')+(ident?' · '+ident:''));
  tip.innerHTML=`<div class="font-semibold text-white">${esc(head)}</div><div class="text-slate-300">${fmt(o.start)} · ${dur(o.end-o.start)}</div>`;
  tip.style.opacity='1'; moveTip(x,y);
}
function redrawOverrides(date){ closeOverrideEditor(); if(currentDay) openDay(currentDay); renderWeek(); }
function beginOverrideDrag(e, date, idx, mf, el, mode){
  e.preventDefault(); e.stopPropagation();
  const b=overridesForDay(date)[idx]; if(!b) return;
  const startY=e.clientY, origStart=b.start, origEnd=b.end, len=origEnd-origStart, range=mf.frameEnd-mf.frameStart;
  let cur={start:origStart,end:origEnd}, moved=false;
  el.setPointerCapture(e.pointerId);
  el.style.cursor = mode==='move'?'grabbing':'ns-resize';
  const move=ev=>{
    if(Math.abs(ev.clientY-startY)>3) moved=true;   // distinguish a click (edit) from a drag (move/resize)
    const dMin=(ev.clientY-startY)/BAR_H*range;
    if(mode==='move'){ let s=snap5(origStart+dMin); s=Math.max(mf.frameStart, Math.min(s, mf.frameEnd-len)); cur={start:s, end:s+len}; }
    else            { let en=snap5(origEnd+dMin); en=Math.max(origStart+5, Math.min(en, mf.frameEnd)); cur={start:origStart, end:en}; }
    const top=yFor(cur.start,mf); el.style.top=top+'px'; el.style.height=Math.max(6,yFor(cur.end,mf)-top)+'px';
    showOverrideLabel({...b,...cur}, ev.clientX, ev.clientY);
  };
  const up=()=>{ try{ el.releasePointerCapture(e.pointerId); }catch(_){}
    el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up);
    hideTip();
    if(!moved && mode==='move'){ openOverrideEditor(date, idx, el); return; }   // a tap opens the type/target editor
    updateOverride(date, idx, cur.start, cur.end); redrawOverrides(date); };
  el.addEventListener('pointermove',move); el.addEventListener('pointerup',up);
}
function wireOverrides(date, mf){
  const col=document.getElementById('ovrCol');
  if(col) col.addEventListener('click', e=>{ if(e.target!==col) return; addOverride(date, minFromY(col, e.clientY, mf)); redrawOverrides(date); });
  document.querySelectorAll('#ovrCol .ovr').forEach(el=>{
    const idx=+el.dataset.oidx, x=el.querySelector('.ovr-x'), handle=el.querySelector('.ovr-handle');
    x.addEventListener('click', ev=>{ ev.stopPropagation(); deleteOverride(date,idx); redrawOverrides(date); });
    handle.addEventListener('pointerdown', ev=> beginOverrideDrag(ev, date, idx, mf, el, 'resize'));
    el.addEventListener('pointerdown', ev=>{ if(ev.target===handle || ev.target===x) return; beginOverrideDrag(ev, date, idx, mf, el, 'move'); });
  });
  const cl=document.getElementById('ovrClear'); if(cl) cl.onclick=()=>{ clearOverrides(date); redrawOverrides(date); };
}

function openDay(date){
  currentDay = date;
  const m = dayModel(date);
  const mtgs = meetingsForDay(date);
  const modal = document.getElementById('modal'), body = document.getElementById('modalBody');
  document.getElementById('modalTitle').textContent =
    new Date(date+'T00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});
  if(!m && !mtgs.length){ body.innerHTML='<p class="text-slate-400 py-8 text-center">No activity recorded this day.</p>'; modal.classList.remove('hidden'); return; }
  TIP = []; MIDX = [];
  const mf = frameFor(date, m);
  const rsegs = overlay(m?m.segs:[], date);

  const axisHead = `<div><div class="text-center text-[11px] font-semibold mb-1.5 invisible" aria-hidden="true">x</div>${hourAxis(mf,true)}</div>`;
  let cols = `<div class="flex gap-4 items-start">${axisHead}`;
  cols += `<div class="pl-1"><div class="text-center text-[11px] font-semibold text-white mb-1.5">Resolved</div>
           ${barHTML(mf,mergeSameJira(rsegs),'width:96px',{detail:true,breaks:mergedBreaks(date)})}</div>`;
  if(mtgs.length){
    cols += `<div class="pl-1"><div class="text-center text-[10px] font-medium mb-1.5" style="color:${MEETING}">Meetings</div>${meetingColHTML(date,mf)}</div>`;
  }
  cols += `<div class="pl-1"><div class="text-center text-[10px] font-medium mb-1.5" style="color:${BREAKCOL}">Overrides</div>
           ${overrideColHTML(date,mf)}
           ${overridesForDay(date).length?`<button id="ovrClear" class="mt-1 w-full text-[10px] text-slate-500 hover:text-slate-300 underline">clear overrides</button>`:'<div class="mt-1 text-center text-[9px] text-slate-600">click to add</div>'}</div>`;
  const laneIds = m ? [...new Set(m.segs.map(s=>s.lane))].sort((a,b)=>(DATA.lanes[b]?.isApp?1:0)-(DATA.lanes[a]?.isApp?1:0)) : [];
  for(const id of laneIds){
    const segs=m.segs.filter(s=>s.lane===id);
    const laneEvs=m.evs.filter(e=>e.lane===id);
    const app=DATA.lanes[id]?.isApp;
    cols += `<div class="pl-1"><div class="text-center text-[10px] font-medium mb-1.5 truncate ${app?'text-amber-300':'text-slate-300'}" style="max-width:96px" title="${laneShort(id)}">
             ${app?'★ ':''}${laneShort(id)}</div>${barHTML(mf,segs,'width:96px',{detail:true,events:laneEvs})}</div>`;
  }
  cols += `</div>`;

  // group the resolved segs by the active lens (timesheet code or jira)
  const grp={};   // gk -> {mins, jira, code, worked, meeting}
  for(const s of rsegs){
    const isM=s.meeting, gk=isM?'__meeting__':((s.fixed?'fix:':'')+groupKey(s.jira));
    const g=grp[gk] || (grp[gk]={mins:0, jira:isM?null:s.jira, code:(!isM&&grouped(s.jira))?codeOf(s.jira):null, worked:false, meeting:isM, fixed:!!s.fixed, custom:!!s.custom});
    g.mins+=(s.end-s.start);
    if(!isM && s.lane!==REVIEW_LANE && s.jira) g.worked=true;
  }
  const entries=Object.entries(grp).sort((a,b)=>b[1].mins-a[1].mins);
  // review-only = no worktree/focus time that day (someone else's PR); a code is review-only if no member was worked
  const isReviewG = g => !g.meeting && (g.code ? !g.worked : (!!g.jira && !g.worked));
  const span = rsegs.length ? `active ${dur(rsegs[rsegs.length-1].end-rsegs[0].start)} (${fmt(rsegs[0].start)}–${fmt(rsegs[rsegs.length-1].end)})` : '';
  const chip = ([gk,g])=>{
    if(g.meeting) return `<div class="legitem flex items-center gap-1.5 bg-white/5 rounded-lg px-2.5 py-1 text-xs" data-jira="__meeting__">
        <span class="w-2.5 h-2.5 rounded-sm" style="background:${MEETING}"></span><span class="font-medium">meetings</span>
        <span class="mono text-slate-300">${dur(g.mins)}</span></div>`;
    const fx = g.fixed?`<span class="text-[9px] px-1 rounded bg-white/10 text-amber-200" title="locked — Fit and Round leave this exact">fixed</span>`:'';
    if(g.code) return `<div class="legitem flex items-center gap-1.5 bg-white/5 rounded-lg px-2.5 py-1 text-xs" data-jira="${esc(gk)}">
        <span class="w-2.5 h-2.5 rounded-sm" style="background:${codeColor(g.code)}"></span>
        <span class="font-medium">${esc(g.code)}</span><span class="text-slate-400">code</span>${fx}
        <span class="mono text-slate-300">${dur(g.mins)}</span></div>`;
    const jira=g.jira, code=jira&&codeOf(jira), tag=jira&&(g.custom||SERVED);   // custom names assign locally, so they're clickable even on file://
    return `<div class="legitem flex items-center gap-1.5 bg-white/5 rounded-lg px-2.5 py-1 text-xs ${tag?'cursor-pointer hover:bg-white/10':''}" data-jira="${esc(gk)}"${tag?` data-codejira="${esc(jira)}" data-custom="${g.custom?'1':''}"`:''}${reviewPop(jira)}>
      <span class="w-2.5 h-2.5 rounded-sm" style="background:${colorFor(jira)}"></span>
      <span class="font-medium">${esc(jira||'no jira')}</span>${(jira&&nameFor(jira))?`<span class="text-slate-400">${nameFor(jira)}</span>`:''}${code?`<span class="text-[9px] px-1 rounded" style="background:${codeColor(code)};color:rgba(0,0,0,.72)">${code}</span>`:''}${fx}
      <span class="mono text-slate-300">${dur(g.mins)}</span></div>`; };
  const taskTot=entries.filter(([,g])=>!isReviewG(g)), revTot=entries.filter(([,g])=>isReviewG(g));
  const label=t=>`<div class="w-full text-[10px] uppercase tracking-wide text-slate-500 mt-1">${t}</div>`;
  let chips=(revTot.length?label('Tasks'):'')+taskTot.map(chip).join('');
  if(revTot.length) chips+=label('Reviews')+revTot.map(chip).join('');
  let totHTML=`<div class="mt-5 pt-4 border-t border-white/10">
    <div class="text-xs text-slate-400 mb-2">Rough breakdown · ${span} · <span style="display:inline-block;width:9px;height:7px;border-radius:3px 3px 3px 0;background:currentColor;vertical-align:middle"></span> prompt ◆ checkout · <span style="color:rgba(239,68,68,.85)">▬</span> focus/review · ▦ meeting (click to toggle) · <span style="color:${BREAKCOL}">▨</span> override (click empty to add a break · click a block to relabel it as a task)</div>
    <div class="flex flex-wrap gap-2 items-center">${chips}`;
  body.innerHTML = cols + totHTML + `</div>`;
  modal.classList.remove('hidden');
  body.querySelectorAll('[data-mid]').forEach(el=> el.onclick = ()=> toggleMeeting(MIDX[+el.dataset.mid].id));
  body.querySelectorAll('[data-codejira]').forEach(el=> el.addEventListener('click', e=>{ e.stopPropagation(); openCodeMenu(el.dataset.codejira, el, el.dataset.custom==='1'); }));
  wireOverrides(date, mf);
  wireHover();
}
function closeModal(){ document.getElementById('modal').classList.add('hidden'); currentDay=null; }

// ---------- tooltip + hover wiring ----------
const tip = document.getElementById('tip');
function showTip(seg, x, y){
  const dl = (seg.end-seg.start);
  let head, line3;
  if(seg.meeting){
    head = seg.title;
    line3 = 'calendar meeting';
    if(seg.busy) line3 += ' · ' + seg.busy.toLowerCase();
    if('on' in seg) line3 += seg.on ? ' · included' : ' · excluded';
    line3 += '\n↪ click in the Meetings column to toggle';
  } else if(grouped(seg.jira)){
    const code=codeOf(seg.jira);
    const members=[...new Set((seg.events||[]).map(e=>e.jira).filter(Boolean))];
    head = `${code} · timecode`;
    line3 = `${seg.events.length} event${seg.events.length===1?'':'s'}` + (members.length?`\n↪ ${members.join(', ')}`:'');
  } else {
    head = seg.jira ? `${seg.jira} · ${nameFor(seg.jira)}` : (nameFor(null)+' · '+laneShort(seg.lane));
    line3 = `${seg.events.length} event${seg.events.length===1?'':'s'} · ${laneShort(seg.lane)}`;
    const init = seg.init;
    if(init){ line3 += `\n↪ started with ${typeLabel(init.type)}`; if(init.preview) line3 += `: “${init.preview}”`; else if(init.branch) line3 += ` (${init.branch})`; }
  }
  tip.innerHTML = `<div class="font-semibold text-white mb-0.5"></div><div class="text-slate-400 mono mb-1"></div><div class="text-slate-300"></div>`;
  const kids = tip.children;
  kids[0].textContent = head;
  kids[1].textContent = `${fmt(seg.start)}–${fmt(seg.end)} · ${dur(dl)}`;
  kids[2].style.whiteSpace='pre-line';
  kids[2].textContent = line3;
  tip.style.opacity='1';
  moveTip(x,y);
}
function moveTip(x,y){
  const r=tip.getBoundingClientRect();
  let nx=x+14, ny=y+14;
  if(nx+r.width>innerWidth-8) nx=x-r.width-14;
  if(ny+r.height>innerHeight-8) ny=y-r.height-14;
  tip.style.left=nx+'px'; tip.style.top=ny+'px';
}
function hideTip(){ tip.style.opacity='0'; }

function wireHover(){
  document.querySelectorAll('[data-jira]').forEach(el=>{
    el.addEventListener('mouseenter', ()=> setHiKey(el.dataset.jira));
    el.addEventListener('mouseleave', ()=> setHiKey(null));
  });
  document.querySelectorAll('.seg[data-tip]').forEach(el=>{
    const seg = TIP[+el.dataset.tip];
    el.addEventListener('mouseenter', e=> showTip(seg, e.clientX, e.clientY));
    el.addEventListener('mousemove', e=> moveTip(e.clientX, e.clientY));
    el.addEventListener('mouseleave', hideTip);
  });
}
function setHiKey(key){
  document.querySelectorAll('[data-jira]').forEach(el=>{
    const match = key && el.dataset.jira===key;
    el.classList.toggle('dim', !!key && !match);
    el.classList.toggle('hi', !!match);
  });
}

// classy colour wash behind everything, built from the week's busiest colours
const BG_SPOTS=[[12,16],[86,12],[80,74],[16,82],[52,42],[42,6]];
function weekPalette(week){
  const tally={};
  for(const d of week.days){
    const m=dayModel(d.date);
    const sum=daySummary(d.date, overlay(m?m.segs:[], d.date));
    for(const it of sum.items) tally[it.color]=(tally[it.color]||0)+it.mins;
  }
  return Object.entries(tally).sort((a,b)=>b[1]-a[1]).slice(0,6).map(e=>e[0]);
}
function applyBg(iso){
  const bg=document.getElementById('bg'); if(!bg) return;
  const week=DATA.weeks.find(w=>w.iso===iso);
  const cols=week?weekPalette(week):[];
  bg.style.backgroundImage = cols.length
    ? cols.map((c,i)=>{ const [x,y]=BG_SPOTS[i%BG_SPOTS.length]; return `radial-gradient(42% 42% at ${x}% ${y}%, ${hexA(c,0.5)} 0%, transparent 100%)`; }).join(',')
    : 'none';
}
function selectWeek(iso){ currentWeek=iso; renderTabs(); applyBg(iso); renderWeek(); renderLegend(); applyEffect(); }
// jiras whose only activity is reviewing someone else's PR (no work of your own)
function reviewOnlyJiras(){
  const work=new Set(), rev=new Set();
  for(const e of DATA.events){ if(e.jira) (e.type==='review'?rev:work).add(e.jira); }
  return new Set([...rev].filter(j=>!work.has(j)));
}
function renderLegend(){
  const jiras=[...new Set(DATA.events.map(e=>e.jira).filter(Boolean))].sort();
  const reviews=reviewOnlyJiras();
  const reviewJiras=jiras.filter(j=>reviews.has(j));
  const taskJiras=jiras.filter(j=>!reviews.has(j));
  const sectioned=reviewJiras.length>0;
  const label=t=>`<span class="w-full text-[10px] uppercase tracking-wide text-slate-500">${t}</span>`;
  const chip=j=>{ const c=CODES[j];
    return `<span class="legitem flex items-center gap-1.5 ${SERVED?'cursor-pointer':''}" data-jira="${keyOf(j)}"${SERVED?` data-codejira="${j}"`:''}${reviewPop(j)} style="color:${colorFor(j)}">
      <span class="w-3 h-3 rounded-sm" style="background:${colorFor(j)}"></span>
      <span class="font-semibold">${j}</span><span class="text-slate-400">${nameFor(j)}</span>${c?`<span class="text-[9px] px-1 rounded" style="background:${codeColor(c)};color:rgba(0,0,0,.72)">${c}</span>`:''}</span>`; };
  let h = (sectioned ? label('Tasks') : '') + taskJiras.map(chip).join('');
  h += `<span class="legitem flex items-center gap-1.5" data-jira="__none__"><span class="w-3 h-3 rounded-sm" style="background:${NOJIRA}"></span><span class="text-slate-400">no jira</span></span>`;
  if((DATA.meetings||[]).length){
    h += `<span class="legitem flex items-center gap-1.5" data-jira="__meeting__"><span class="w-3 h-3 rounded-sm" style="background:${MEETING};background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.3) 0 3px,transparent 3px 6px)"></span><span class="text-slate-400">meeting</span></span>`;
    h += `<button id="resetMtg" class="ml-auto text-[11px] text-slate-500 hover:text-slate-300 underline">reset meeting toggles</button>`;
  }
  if(sectioned) h += label('Reviews') + reviewJiras.map(chip).join('');
  document.getElementById('legend').innerHTML = h;
  const rb=document.getElementById('resetMtg'); if(rb) rb.onclick=resetToggles;
  if(SERVED) document.getElementById('legend').querySelectorAll('[data-codejira]').forEach(el=> el.addEventListener('click', e=>{ e.stopPropagation(); openCodeMenu(el.dataset.codejira, el); }));
  wireHover();
}

// ---------- timesheet-code assignment menu (real jiras write config.json; custom names stay local) ----------
function existingCodes(){ return [...new Set([...Object.values(CODES), ...Object.values(CUSTOM_CODES)])].filter(Boolean).sort(); }
function assignCode(jira, code, isCustom){
  if(isCustom){   // a custom override name — local-only, no server round-trip
    if(code) CUSTOM_CODES[jira]=code; else delete CUSTOM_CODES[jira];
    saveCustomCodes(); refreshAll();
    return;
  }
  const prev = CODES[jira];
  if(code) CODES[jira]=code; else delete CODES[jira];
  refreshAll();
  fetch('/jira-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jira, code:code||''})})
    .then(r=>{ if(!r.ok) throw new Error('bad'); })
    .catch(()=>{ if(prev) CODES[jira]=prev; else delete CODES[jira]; refreshAll(); alert('Saving code failed — is the server still running?'); });
}
function removeCode(code){
  const prev={}; for(const j in CODES){ if(CODES[j]===code){ prev[j]=code; delete CODES[j]; } }
  const prevC={}; for(const j in CUSTOM_CODES){ if(CUSTOM_CODES[j]===code){ prevC[j]=code; delete CUSTOM_CODES[j]; } }
  if(Object.keys(prevC).length) saveCustomCodes();
  refreshAll();
  if(!Object.keys(prev).length) return;   // custom-only code: nothing to persist server-side
  fetch('/remove-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})})
    .then(r=>{ if(!r.ok) throw new Error('bad'); })
    .catch(()=>{ Object.assign(CODES, prev); refreshAll(); alert('Removing code failed — is the server still running?'); });
}
function closeCodeMenu(){ const m=document.getElementById('codeMenu'); if(m) m.remove(); }
function openCodeMenu(jira, anchor, isCustom){
  closeCodeMenu();
  const cur=codeOf(jira)||'', codes=existingCodes();
  const m=document.createElement('div');
  m.id='codeMenu';
  m.className='fixed z-50 bg-[#0c0e14] border border-white/15 rounded-lg shadow-xl p-2.5 text-xs';
  m.style.minWidth='190px';
  let html=`<div class="text-slate-400 mb-1.5">Timecode · <span class="text-slate-200 font-semibold">${esc(jira)}</span>${isCustom?' <span class="text-[10px] text-slate-500">· custom, saved locally</span>':''}</div>`;
  if(codes.length) html+=`<div class="flex flex-wrap gap-1 mb-1.5">`+codes.map(c=>`<span class="inline-flex items-center rounded border ${c===cur?'bg-blue-500 border-blue-400':'border-white/10'}">
      <button data-code="${c}" class="pl-2 pr-1 py-0.5 ${c===cur?'text-white':'text-slate-300 hover:bg-white/10'}">${c}</button>
      <button data-rmcode="${c}" title="remove this code from all tickets" class="px-1.5 py-0.5 leading-none border-l ${c===cur?'border-blue-300/40 text-blue-100 hover:text-white':'border-white/10 text-slate-500 hover:text-red-300'}">×</button></span>`).join('')+`</div>`;
  html+=`<div class="flex gap-1"><input id="codeInput" placeholder="new code…" class="flex-1 min-w-0 bg-white/5 border border-white/10 rounded px-2 py-0.5 text-slate-100 outline-none focus:border-blue-400"><button id="codeAdd" class="px-2 py-0.5 rounded bg-white/10 hover:bg-white/20 text-slate-200">set</button></div>`;
  if(cur) html+=`<button id="codeClear" class="mt-1.5 text-slate-500 hover:text-slate-300 underline">remove from ${cur}</button>`;
  m.innerHTML=html;
  document.body.appendChild(m);
  const r=anchor.getBoundingClientRect();
  m.style.left=Math.min(r.left, innerWidth-m.offsetWidth-8)+'px';
  m.style.top=(Math.min(r.bottom+6, innerHeight-m.offsetHeight-8))+'px';
  m.querySelectorAll('[data-code]').forEach(b=> b.onclick=()=>{ closeCodeMenu(); assignCode(jira, b.dataset.code, isCustom); });
  m.querySelectorAll('[data-rmcode]').forEach(b=> b.onclick=()=>{ closeCodeMenu(); removeCode(b.dataset.rmcode); });
  const inp=m.querySelector('#codeInput'); inp.focus();
  const add=()=>{ const v=inp.value.trim(); closeCodeMenu(); if(v) assignCode(jira, v, isCustom); };
  m.querySelector('#codeAdd').onclick=add;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') add(); else if(e.key==='Escape') closeCodeMenu(); });
  const cl=m.querySelector('#codeClear'); if(cl) cl.onclick=()=>{ closeCodeMenu(); assignCode(jira,'', isCustom); };
}
document.addEventListener('mousedown', e=>{ const m=document.getElementById('codeMenu'); if(m && !m.contains(e.target) && !e.target.closest('[data-codejira]')) closeCodeMenu(); }, true);

// ---------- override editor: set an entry's type (break/task/fixed) and its target ----------
function closeOverrideEditor(){ const m=document.getElementById('ovrMenu'); if(m) m.remove(); }
function openOverrideEditor(date, idx, anchor){
  closeOverrideEditor();
  const o=(OVERRIDES[date]||[])[idx]; if(!o) return;
  const m=document.createElement('div');
  m.id='ovrMenu';
  m.className='fixed z-50 bg-[#0c0e14] border border-white/15 rounded-lg shadow-xl p-2.5 text-xs';
  m.style.minWidth='210px'; m.style.maxWidth='240px';
  const seg=(t,lab)=>`<button data-type="${t}" class="flex-1 px-2 py-1 ${o.type===t?'bg-blue-500 text-white':'text-slate-300 hover:bg-white/10'}">${lab}</button>`;
  let html=`<div class="flex rounded-md overflow-hidden border border-white/10 mb-2">${seg('break','Break')}${seg('task','Task')}${seg('fixed','Fixed')}</div>`;
  if(o.type!=='break'){
    const ident=o.jira||o.label||'';
    html+=`<div class="text-slate-400 mb-1.5">Label · <span class="text-slate-200 font-semibold">${ident?esc(ident):'pick one'}</span>${o.type==='fixed'?' <span class="text-amber-200">· locked</span>':''}</div>`;
    const tix=ticketsThisWeek(date);
    if(tix.length) html+=`<div class="text-[10px] text-slate-500 mb-0.5">tickets this week</div><div class="flex flex-wrap gap-1 mb-1.5">`
      +tix.map(j=>`<button data-jira="${esc(j)}" class="px-1.5 py-0.5 rounded border ${o.jira===j?'bg-blue-500 border-blue-400 text-white':'border-white/10 text-slate-300 hover:bg-white/10'}">${esc(j)}</button>`).join('')+`</div>`;
    const customs=customNamesInWindow();
    if(customs.length) html+=`<div class="text-[10px] text-slate-500 mb-0.5">custom names</div><div class="flex flex-wrap gap-1 mb-1.5">`
      +customs.map(n=>`<button data-label="${esc(n)}" class="px-1.5 py-0.5 rounded border ${o.label===n?'bg-blue-500 border-blue-400 text-white':'border-white/10 text-slate-300 hover:bg-white/10'}">${esc(n)}</button>`).join('')+`</div>`;
    html+=`<div class="flex gap-1"><input id="ovrName" placeholder="new custom name…" class="flex-1 min-w-0 bg-white/5 border border-white/10 rounded px-2 py-0.5 text-slate-100 outline-none focus:border-blue-400"><button id="ovrSet" class="px-2 py-0.5 rounded bg-white/10 hover:bg-white/20 text-slate-200">set</button></div>`;
  }
  html+=`<button id="ovrDel" class="mt-2 text-slate-500 hover:text-red-300 underline">delete entry</button>`;
  m.innerHTML=html;
  document.body.appendChild(m);
  const r=anchor.getBoundingClientRect();
  m.style.left=Math.max(8, Math.min(r.right+6, innerWidth-m.offsetWidth-8))+'px';
  m.style.top=Math.max(8, Math.min(r.top, innerHeight-m.offsetHeight-8))+'px';
  const pick=patch=>{ chooseTarget(date,idx,patch); closeOverrideEditor(); redrawOverrides(date); };
  m.querySelectorAll('[data-type]').forEach(btn=> btn.onclick=()=>{
    const t=btn.dataset.type;
    if(t==='break'){ setOverride(date,idx,{type:'break', jira:undefined, label:undefined}); closeOverrideEditor(); redrawOverrides(date); }
    else { setOverride(date,idx,{type:t}); openOverrideEditor(date,idx,anchor); }   // reopen to reveal the target picker
  });
  m.querySelectorAll('[data-jira]').forEach(btn=> btn.onclick=()=> pick({jira:btn.dataset.jira}));
  m.querySelectorAll('[data-label]').forEach(btn=> btn.onclick=()=> pick({label:btn.dataset.label}));
  const inp=m.querySelector('#ovrName');
  if(inp){ inp.focus();
    const set=()=>{ const v=inp.value.trim(); if(v) pick({label:v}); };
    m.querySelector('#ovrSet').onclick=set;
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') set(); else if(e.key==='Escape') closeOverrideEditor(); });
  }
  m.querySelector('#ovrDel').onclick=()=>{ deleteOverride(date,idx); closeOverrideEditor(); redrawOverrides(date); };
}
document.addEventListener('mousedown', e=>{ const m=document.getElementById('ovrMenu'); if(m && !m.contains(e.target) && !e.target.closest('.ovr')) closeOverrideEditor(); }, true);

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeSettings(); closeSetup(); } });
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal(); });
document.getElementById('settings').addEventListener('click',e=>{ if(e.target.id==='settings') closeSettings(); });
document.getElementById('setup').addEventListener('click',e=>{ if(e.target.id==='setup') closeSetup(); });
// today's catch-up gap is measured against the wall clock, which only advances
// between renders — so re-render the week whenever you return to the tab.
function refreshLive(){ if(!document.hidden) renderWeek(); }
window.addEventListener('focus', refreshLive);
document.addEventListener('visibilitychange', refreshLive);
document.getElementById('sub').textContent =
  `${DATA.window?.weeks||'?'} weeks · ${DATA.events.length} signals · ${Object.keys(DATA.lanes).length} worktrees · ${DATA.tz||''} · built ${new Date(DATA.generatedAt).toLocaleString()}`;
renderTabs(); renderAdjust(); applyBg(currentWeek); renderWeek(); renderLegend(); loadSetupState(); applyEffect();
</script>

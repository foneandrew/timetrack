<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>timetrack</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .seg { transition: opacity .12s ease, filter .12s ease, outline .12s ease; cursor: default; }
  .seg:hover { filter: brightness(1.15); outline: 2px solid rgba(255,255,255,.7); outline-offset:-1px; z-index:6; }
  .daycol { transition: background .12s ease; }
  .daycol:hover { background: rgba(255,255,255,.05); }
  .gridline { position:absolute; left:0; right:0; border-top:1px dashed rgba(255,255,255,.10); pointer-events:none; }
  .dim { opacity:.18 !important; }
  .legitem { transition: opacity .12s ease; cursor: default; }
  .tab { transition: all .12s ease; }
  .notch { position:absolute; pointer-events:none; }
  #tip { position:fixed; z-index:50; pointer-events:none; max-width:300px; opacity:0; transition:opacity .08s ease; }
</style>
</head>
<body class="text-slate-100 min-h-screen" style="background:#1c2029">
<div id="bg" style="position:fixed;inset:0;z-index:-1;pointer-events:none;filter:blur(95px) saturate(1.3);transform:scale(1.35);transition:background-image .7s ease"></div>
<div class="max-w-[1240px] mx-auto px-6 py-7 relative">

  <header class="flex items-baseline justify-between flex-wrap gap-3 mb-6">
    <div>
      <h1 class="text-2xl font-bold text-white tracking-tight">timetrack</h1>
      <p id="sub" class="text-sm text-slate-400 mt-0.5"></p>
    </div>
    <div id="weektabs" class="flex gap-1.5 flex-wrap"></div>
  </header>

  <div id="adjust" class="flex items-center gap-2 mb-4 text-xs flex-wrap"></div>
  <div id="week" class="mb-6"></div>
  <div id="legend" class="flex flex-wrap gap-x-5 gap-y-2 text-xs text-slate-300"></div>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-20 flex items-start justify-center overflow-auto py-8 px-4">
  <div class="bg-[#2b3242] border border-white/10 rounded-2xl shadow-2xl w-full max-w-[1120px] p-6">
    <div class="flex items-center justify-between mb-5">
      <h2 id="modalTitle" class="text-lg font-semibold text-white"></h2>
      <button onclick="closeModal()" class="text-slate-300 hover:text-white text-sm px-3 py-1.5 rounded-lg hover:bg-white/10">esc ✕</button>
    </div>
    <div id="modalBody" class="overflow-x-auto"></div>
  </div>
</div>

<div id="tip" class="bg-[#0c0e14] border border-white/15 rounded-lg shadow-xl px-3 py-2 text-xs"></div>

<script>
/*__TIMETRACK_DATA__*/
const DATA = window.__TIMETRACK__ || {events:[],lanes:{},weeks:[],jiraNames:{},frame:{startMin:480,endMin:1020,idleTailMin:30}};
const FRAME = DATA.frame;
const NAMES = DATA.jiraNames || {};
const REVIEW_LANE = '__github_review__';

// ---------- colour ----------
const PALETTE = ['#6ea0ff','#3fd6b6','#f0b04c','#ec7aa0','#9f93ff','#56c6ec','#e07d5c','#8fcc5e','#dd72c8','#6fbcbc','#c79bf0','#eab057'];
const NOJIRA = '#5b6478';
const MEETING = '#b388f0';
const MEETING_PALETTE = ['#b388f0','#e07ad0','#8e9bf0','#c792ea','#f08ab0','#9d7ce0','#d3a4f5','#7e8ce8','#dd8fd6','#a9a0f2'];
const meetingColors = {}; let mIdx = 0;
function meetingColorFor(title){
  if(!(title in meetingColors)) meetingColors[title] = MEETING_PALETTE[mIdx++ % MEETING_PALETTE.length];
  return meetingColors[title];
}
const jiraColors = {}; let colorIdx = 0;
function colorFor(jira){
  if(jira==='__meeting__') return MEETING;
  if(!jira) return NOJIRA;
  if(!(jira in jiraColors)) jiraColors[jira] = PALETTE[colorIdx++ % PALETTE.length];
  return jiraColors[jira];
}
function nameFor(jira){ if(jira==='__meeting__') return 'meeting'; return jira ? (NAMES[jira] || '') : 'no jira'; }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

// ---------- meetings (toggle state persisted in localStorage) ----------
const MSTATE = (()=>{ try { return JSON.parse(localStorage.getItem('tt_meetings')||'{}'); } catch(e){ return {}; } })();
function saveMState(){ try { localStorage.setItem('tt_meetings', JSON.stringify(MSTATE)); } catch(e){} }
function meetingsForDay(date){ return (DATA.meetings||[]).filter(m=>m.date===date).sort((a,b)=>a.startMin-b.startMin); }
function isOn(m){ return (m.id in MSTATE) ? MSTATE[m.id] : m.defaultOn; }
function toggleMeeting(id){
  const m=(DATA.meetings||[]).find(x=>x.id===id); if(!m) return;
  MSTATE[id]=!isOn(m); saveMState();
  if(currentDay) openDay(currentDay);   // refresh modal
  renderWeek();                          // refresh week behind
}
// meetings win during their slot; task timeline underneath resumes after
function overlay(baseSegs, date){
  let segs = baseSegs.map(s=>({...s}));
  for(const mt of meetingsForDay(date)){
    if(!isOn(mt)) continue;
    const out=[];
    for(const s of segs){
      if(s.end<=mt.startMin || s.start>=mt.endMin){ out.push(s); continue; }
      if(s.start<mt.startMin) out.push({...s,end:mt.startMin});
      if(s.end>mt.endMin)     out.push({...s,start:mt.endMin});
    }
    out.push({start:mt.startMin,end:mt.endMin,meeting:true,title:mt.title,id:mt.id,jira:'__meeting__'});
    segs=out;
  }
  return segs.sort((a,b)=>a.start-b.start);
}
function frameFor(date, base){
  let s = base?base.frameStart:FRAME.startMin, e = base?base.frameEnd:FRAME.endMin;
  for(const mt of meetingsForDay(date)){ if(isOn(mt)){ s=Math.min(s,mt.startMin); e=Math.max(e,mt.endMin); } }
  return {frameStart:s, frameEnd:e};
}
// ---------- timesheet adjustments (fit to 7:30 / round to 15m) ----------
const FULL_DAY = 450, QUARTER = 15;
let TT_FIT   = localStorage.getItem('tt_fit')==='1';
let TT_ROUND = localStorage.getItem('tt_round')==='1';

// largest-remainder apportionment: round each value to a multiple of QUARTER
// so the rounded values sum exactly to `target`. One strategy, fit or no fit.
function distribute(vals, target){
  const tq = Math.round(target/QUARTER);
  const floors = vals.map(v=>Math.floor(v/QUARTER));
  let rem = tq - floors.reduce((a,b)=>a+b,0);
  const order = vals.map((v,i)=>({i, frac:(v/QUARTER)-floors[i]})).sort((a,b)=>b.frac-a.frac);
  const out = floors.slice();
  for(let k=0; k<order.length && rem>0; k++){ out[order[k].i]++; rem--; }
  for(let k=order.length-1; k>=0 && rem<0; k--){ if(out[order[k].i]>0){ out[order[k].i]--; rem++; } }
  return out.map(q=>q*QUARTER);
}

function applyAdjust(items){
  let arr = items.map(it=>({...it}));
  if(TT_FIT){
    const mt = arr.filter(i=>i.meeting).reduce((s,i)=>s+i.mins,0);
    const nm = arr.filter(i=>!i.meeting).reduce((s,i)=>s+i.mins,0);
    const target = Math.max(0, FULL_DAY - mt);
    if(nm>0){ const f=target/nm; arr.forEach(i=>{ if(!i.meeting) i.mins*=f; }); }
  }
  if(TT_ROUND){
    const sum = arr.reduce((s,i)=>s+i.mins,0);
    const target = TT_FIT ? FULL_DAY : Math.round(sum/QUARTER)*QUARTER;
    const q = distribute(arr.map(i=>i.mins), target);
    arr.forEach((it,idx)=> it.mins=q[idx]);
  }
  return arr.filter(i=>i.mins>0).sort((a,b)=>b.mins-a.mins);
}

// timesheet rows for a day: each jira/no-jira + each attended meeting, with time
function daySummary(date, segs){
  const jt={}, worked=new Set();
  for(const s of segs){ if(s.meeting) continue; const k=s.jira||'(no jira)'; jt[k]=(jt[k]||0)+(s.end-s.start);
    if(s.lane!==REVIEW_LANE && s.jira) worked.add(s.jira); }
  const raw=[];
  for(const k in jt){ const jira=k==='(no jira)'?null:k;
    raw.push({key:keyOf(jira), label:(jira||'no jira'), sub:(jira?nameFor(jira):''), color:colorFor(jira), mins:jt[k],
              reviewOnly: !!jira && !worked.has(jira)}); }
  const mtgs=meetingsForDay(date);
  for(const mt of mtgs){ if(!isOn(mt)) continue;
    raw.push({key:'__meeting__', label:mt.title, sub:'', color:meetingColorFor(mt.title), mins:mt.endMin-mt.startMin, meeting:true}); }
  const items = applyAdjust(raw);
  return {items, things:Object.keys(jt).length, attended:mtgs.filter(isOn).length, total:mtgs.length,
          totalMins:items.reduce((s,i)=>s+i.mins,0)};
}
function resetToggles(){
  for(const k in MSTATE) delete MSTATE[k];
  saveMState(); renderWeek(); if(currentDay) openDay(currentDay);
}
function refreshAll(){ renderAdjust(); renderWeek(); if(currentDay) openDay(currentDay); }
function renderAdjust(){
  const el=document.getElementById('adjust'); if(!el) return;
  const pill=(on)=> on?'bg-blue-500 border-blue-400 text-white':'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10';
  const note = TT_FIT ? 'scaled to 7:30 (meetings fixed)' : '';
  el.innerHTML = `<span class="text-slate-400 mr-1 font-medium">Timesheet:</span>
    <button id="tFit" class="tab px-3 py-1 rounded-lg border font-medium ${pill(TT_FIT)}">Fit to 7:30</button>
    <button id="tRound" class="tab px-3 py-1 rounded-lg border font-medium ${pill(TT_ROUND)}">Round to 15m</button>
    ${note?`<span class="text-slate-400 ml-1">${note}${TT_ROUND?' · 15-min chunks':''}</span>`:(TT_ROUND?`<span class="text-slate-400 ml-1">15-min chunks</span>`:'')}`;
  document.getElementById('tFit').onclick=()=>{ TT_FIT=!TT_FIT; localStorage.setItem('tt_fit',TT_FIT?'1':'0'); refreshAll(); };
  document.getElementById('tRound').onclick=()=>{ TT_ROUND=!TT_ROUND; localStorage.setItem('tt_round',TT_ROUND?'1':'0'); refreshAll(); };
}
function keyOf(jira){ return jira || '__none__'; }
function laneShort(id){ const l=DATA.lanes[id]; return l?l.label:id.split('/').slice(-1)[0]; }
function textOn(jira){ return jira ? 'rgba(0,0,0,.72)' : 'rgba(255,255,255,.78)'; }
function fmt(min){ const h=Math.floor(min/60), m=Math.round(min%60); return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }
function dur(min){ const h=Math.floor(min/60), m=Math.round(min%60); return (h?h+'h ':'')+(m?m+'m':(h?'':'0m')); }
function typeLabel(t){ return t==='prompt'?'prompt':(t==='gcod'?'gcod checkout':(t==='gco'?'gco checkout':(t==='review'?'PR review':t))); }

// ---------- per-day model (latest-wins attention) ----------
function dayEvents(date){ return DATA.events.filter(e=>e.date===date).sort((a,b)=>a.minute-b.minute); }
function dayModel(date){
  const evs = dayEvents(date);
  if(!evs.length) return null;
  const idle = FRAME.idleTailMin;
  const activeStart = evs[0].minute;
  const activeEnd = evs[evs.length-1].minute + idle;
  let raw=[];
  for(let i=0;i<evs.length;i++){
    const start=evs[i].minute, end=(i<evs.length-1)?evs[i+1].minute:activeEnd;
    if(end<=start) continue;
    raw.push({start,end,lane:evs[i].lane,jira:evs[i].jira,branch:evs[i].branch});
  }
  const merged=[];
  for(const s of raw){
    const last=merged[merged.length-1];
    if(last && last.lane===s.lane && last.jira===s.jira) last.end=s.end;
    else merged.push({...s});
  }
  for(const s of merged){
    s.events = evs.filter(e=>e.lane===s.lane && e.minute>=s.start && e.minute<s.end);
    s.init = s.events[0] || null;
  }
  const totals={};
  for(const s of merged){ const k=s.jira||'(no jira)'; totals[k]=(totals[k]||0)+(s.end-s.start); }
  return {date,activeStart,activeEnd,segs:merged,evs,totals,
          frameStart:Math.min(FRAME.startMin,activeStart),
          frameEnd:Math.max(FRAME.endMin,activeEnd)};
}

// ---------- bar rendering ----------
const BAR_H = 380;
function yFor(min,m){ return (min-m.frameStart)/(m.frameEnd-m.frameStart)*BAR_H; }

// registry for instant tooltips
let TIP = [];
function barHTML(m, segs, widthStyle, opts={}){
  const detail = !!opts.detail;
  let h = `<div class="relative rounded-lg bg-[#252c3b] border border-white/10 overflow-hidden" style="height:${BAR_H}px;${widthStyle||'width:100%'}">`;
  for(let hr=Math.ceil(m.frameStart/60); hr*60<=m.frameEnd; hr++){ h+=`<div class="gridline" style="top:${yFor(hr*60,m)}px"></div>`; }
  for(const s of segs){
    const top=yFor(s.start,m), height=Math.max(2,yFor(s.end,m)-top);
    const label = s.meeting ? s.title : (s.jira||laneShort(s.lane));
    const segColor = s.meeting ? meetingColorFor(s.title) : colorFor(s.jira);
    const stripe = s.meeting ? 'background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.20) 0 5px,transparent 5px 10px);' : '';
    const textCol = s.meeting ? 'rgba(0,0,0,.72)' : textOn(s.jira);
    let attrs = `data-jira="${keyOf(s.jira)}"`;
    if(detail){ const idx=TIP.push(s)-1; attrs += ` data-tip="${idx}"`; }
    else { attrs += ` title="${label} · ${fmt(s.start)}–${fmt(s.end)} · ${dur(s.end-s.start)}"`; }
    h+=`<div class="seg absolute rounded-[3px]" ${attrs}
         style="top:${top}px;height:${height}px;left:3px;right:3px;background:${segColor};${stripe}">
         ${height>15?`<span class="text-[9px] font-semibold pl-1 leading-tight block truncate" style="color:${textCol}">${label}</span>`:''}</div>`;
  }
  if(detail && opts.events){
    for(const e of opts.events){
      const y=yFor(e.minute,m);
      const isPrompt = e.type==='prompt';
      h+=`<div class="notch" title="${fmt(e.minute)} ${typeLabel(e.type)}"
           style="top:${y-4}px;left:2px;width:8px;height:8px;z-index:7;${isPrompt?'border-radius:50%':'transform:rotate(45deg)'};background:#fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.75)"></div>`;
    }
  }
  return h+`</div>`;
}

function hourAxis(m, leftPad=false){
  let h=`<div class="relative mono text-[10px] text-slate-400" style="height:${BAR_H}px;width:${leftPad?42:34}px">`;
  for(let hr=Math.ceil(m.frameStart/60); hr*60<=m.frameEnd; hr++){
    h+=`<div class="absolute right-1" style="top:${yFor(hr*60,m)-6}px">${String(hr).padStart(2,'0')}:00</div>`;
  }
  return h+`</div>`;
}

// ---------- week view ----------
let currentWeek = (DATA.weeks.find(w=>w.isCurrent) || DATA.weeks[DATA.weeks.length-1] || {}).iso;
function renderTabs(){
  document.getElementById('weektabs').innerHTML = DATA.weeks.map(w=>`
    <button onclick="selectWeek('${w.iso}')" class="tab px-3 py-1.5 rounded-lg text-xs font-medium border
      ${w.iso===currentWeek?'bg-blue-500 border-blue-400 text-white':'bg-white/5 border-white/10 text-slate-300 hover:bg-white/10'}">
      ${w.label}${w.isCurrent?' <span class="opacity-70">· now</span>':''}</button>`).join('');
}
function renderWeek(){
  const w = DATA.weeks.find(x=>x.iso===currentWeek);
  if(!w){ document.getElementById('week').innerHTML='<p class="text-slate-400">No data.</p>'; return; }
  const cells = w.days.map(d=>{
    const m = dayModel(d.date);
    const segs = overlay(m?m.segs:[], d.date);
    return {d, m, segs, fr:frameFor(d.date, m), has: !!m || segs.length>0};
  });
  const act = cells.filter(c=>c.has);
  const fStart = act.length?Math.min(...act.map(c=>c.fr.frameStart)):FRAME.startMin;
  const fEnd   = act.length?Math.max(...act.map(c=>c.fr.frameEnd)):FRAME.endMin;
  const shared = {frameStart:fStart, frameEnd:fEnd};

  let html = `<div class="flex gap-3 items-start">${hourAxis(shared)}<div class="flex gap-3 flex-1">`;
  for(const c of cells){
    const d=c.d;
    const sum = c.has ? daySummary(d.date, c.segs) : null;
    html += `<div class="daycol flex-1 min-w-0 rounded-xl p-2 cursor-pointer ${d.isToday?'ring-1 ring-blue-400/50':''}" onclick="openDay('${d.date}')">
      <div class="text-center mb-2">
        <div class="text-xs font-semibold ${d.isToday?'text-blue-300':'text-slate-200'}">${d.weekday.slice(0,3)}</div>
        <div class="text-[10px] text-slate-400 mono">${d.short.replace(/^\w+\s/,'')}</div>
        ${sum?`<div class="text-[10px] text-slate-400 mt-0.5">${sum.things} item${sum.things===1?'':'s'}${sum.total?` · ${sum.attended}/${sum.total} mtgs`:''}</div>`:'<div class="text-[10px] text-slate-600 mt-0.5">·</div>'}</div>`;
    if(c.has){
      html += `<div class="flex justify-center">${barHTML(shared, c.segs, 'width:100%')}</div>`;
      html += `<div class="text-center text-base text-white mono mt-2 font-bold tracking-tight">${dur(sum.totalMins)}</div>`;
      html += `<div class="mt-2.5 space-y-1.5">${sum.items.map(it=>`
        <div class="legitem flex items-baseline gap-1.5 text-[11px]" data-jira="${it.key}">
          <span class="w-2.5 h-2.5 rounded-sm shrink-0 self-center" style="background:${it.color}"></span>
          <span class="truncate flex-1 min-w-0 ${it.meeting?'text-slate-300':'text-slate-100'} font-medium" title="${it.label}${it.sub?(' — '+it.sub):''}${it.reviewOnly?' — code review':''}">${it.label}</span>
          ${it.reviewOnly?'<span class="text-[8px] uppercase tracking-wide px-1 rounded bg-white/15 text-slate-200 shrink-0">review</span>':''}
          <span class="mono font-bold text-white shrink-0 text-xs">${dur(it.mins)}</span></div>`).join('')}</div>`;
    } else {
      html += `<div class="rounded-lg bg-[#252c3b] border border-dashed border-white/10 flex items-center justify-center text-slate-600 text-[10px]" style="height:${BAR_H}px">—</div>
               <div class="text-center text-[10px] text-slate-600 mono mt-1.5">·</div>`;
    }
    html += `</div>`;
  }
  document.getElementById('week').innerHTML = html + `</div></div>`;
  wireHover();
}

// ---------- drill-down ----------
let currentDay = null;
let MIDX = [];
function meetingColHTML(date, mf){
  let h=`<div class="relative rounded-lg bg-[#252c3b] border border-white/10 overflow-hidden" style="height:${BAR_H}px;width:118px">`;
  for(let hr=Math.ceil(mf.frameStart/60); hr*60<=mf.frameEnd; hr++){ h+=`<div class="gridline" style="top:${yFor(hr*60,mf)}px"></div>`; }
  for(const mt of meetingsForDay(date)){
    const on=isOn(mt), top=yFor(mt.startMin,mf), height=Math.max(3,yFor(mt.endMin,mf)-top);
    const col=meetingColorFor(mt.title);
    const idx=MIDX.push(mt)-1;
    const tipIdx=TIP.push({meeting:true,title:mt.title,start:mt.startMin,end:mt.endMin,busy:mt.busy,on})-1;
    const fill = on
      ? `background:${col};background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.20) 0 5px,transparent 5px 10px);`
      : `background:transparent;border:1px dashed ${col};opacity:.5;`;
    h+=`<div data-mid="${idx}" data-tip="${tipIdx}" data-jira="__meeting__" class="seg absolute rounded-[3px] cursor-pointer"
         style="top:${top}px;height:${height}px;left:3px;right:3px;${fill}">
         ${height>15?`<span class="text-[9px] font-semibold pl-1 leading-tight block truncate" style="color:${on?'rgba(0,0,0,.72)':col}">${mt.title}</span>`:''}</div>`;
  }
  return h+`</div>`;
}

function openDay(date){
  currentDay = date;
  const m = dayModel(date);
  const mtgs = meetingsForDay(date);
  const modal = document.getElementById('modal'), body = document.getElementById('modalBody');
  document.getElementById('modalTitle').textContent =
    new Date(date+'T00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});
  if(!m && !mtgs.length){ body.innerHTML='<p class="text-slate-400 py-8 text-center">No activity recorded this day.</p>'; modal.classList.remove('hidden'); return; }
  TIP = []; MIDX = [];
  const mf = frameFor(date, m);
  const rsegs = overlay(m?m.segs:[], date);

  let cols = `<div class="flex gap-4 items-start">${hourAxis(mf,true)}`;
  cols += `<div class="pl-1"><div class="text-center text-[11px] font-semibold text-white mb-1.5">Resolved</div>
           ${barHTML(mf,rsegs,'width:96px',{detail:true,events:m?m.evs:[]})}</div>`;
  if(mtgs.length){
    cols += `<div class="pl-1"><div class="text-center text-[10px] font-medium mb-1.5" style="color:${MEETING}">Meetings</div>${meetingColHTML(date,mf)}</div>`;
  }
  const laneIds = m ? [...new Set(m.segs.map(s=>s.lane))].sort((a,b)=>(DATA.lanes[b]?.isApp?1:0)-(DATA.lanes[a]?.isApp?1:0)) : [];
  for(const id of laneIds){
    const segs=m.segs.filter(s=>s.lane===id);
    const laneEvs=m.evs.filter(e=>e.lane===id);
    const app=DATA.lanes[id]?.isApp;
    cols += `<div class="pl-1"><div class="text-center text-[10px] font-medium mb-1.5 truncate ${app?'text-amber-300':'text-slate-300'}" style="max-width:96px" title="${laneShort(id)}">
             ${app?'★ ':''}${laneShort(id)}</div>${barHTML(mf,segs,'width:96px',{detail:true,events:laneEvs})}</div>`;
  }
  cols += `</div>`;

  const rtot={};
  for(const s of rsegs){ const k=s.meeting?'__meeting__':(s.jira||'(no jira)'); rtot[k]=(rtot[k]||0)+(s.end-s.start); }
  const tot=Object.entries(rtot).sort((a,b)=>b[1]-a[1]);
  const span = rsegs.length ? `active ${dur(rsegs[rsegs.length-1].end-rsegs[0].start)} (${fmt(rsegs[0].start)}–${fmt(rsegs[rsegs.length-1].end)})` : '';
  let totHTML=`<div class="mt-5 pt-4 border-t border-white/10">
    <div class="text-xs text-slate-400 mb-2">Rough breakdown · ${span} · ● prompt ◆ checkout · ▦ meeting (click to toggle)</div>
    <div class="flex flex-wrap gap-2">`;
  for(const [j,mins] of tot){
    const isM = j==='__meeting__';
    const jira = isM?'__meeting__':(j==='(no jira)'?null:j);
    totHTML+=`<div class="legitem flex items-center gap-1.5 bg-white/5 rounded-lg px-2.5 py-1 text-xs" data-jira="${keyOf(jira)}">
      <span class="w-2.5 h-2.5 rounded-sm" style="background:${colorFor(jira)}"></span>
      <span class="font-medium">${isM?'meetings':(jira||'no jira')}</span>${(!isM&&nameFor(jira))?`<span class="text-slate-400">${nameFor(jira)}</span>`:''}
      <span class="mono text-slate-300">${dur(mins)}</span></div>`;
  }
  body.innerHTML = cols + totHTML + `</div>`;
  modal.classList.remove('hidden');
  body.querySelectorAll('[data-mid]').forEach(el=> el.onclick = ()=> toggleMeeting(MIDX[+el.dataset.mid].id));
  wireHover();
}
function closeModal(){ document.getElementById('modal').classList.add('hidden'); currentDay=null; }

// ---------- tooltip + hover wiring ----------
const tip = document.getElementById('tip');
function showTip(seg, x, y){
  const dl = (seg.end-seg.start);
  let head, line3;
  if(seg.meeting){
    head = seg.title;
    line3 = 'calendar meeting';
    if(seg.busy) line3 += ' · ' + seg.busy.toLowerCase();
    if('on' in seg) line3 += seg.on ? ' · included' : ' · excluded';
    line3 += '\n↪ click in the Meetings column to toggle';
  } else {
    head = seg.jira ? `${seg.jira} · ${nameFor(seg.jira)}` : (nameFor(null)+' · '+laneShort(seg.lane));
    line3 = `${seg.events.length} event${seg.events.length===1?'':'s'} · ${laneShort(seg.lane)}`;
    const init = seg.init;
    if(init){ line3 += `\n↪ started with ${typeLabel(init.type)}`; if(init.preview) line3 += `: “${init.preview}”`; else if(init.branch) line3 += ` (${init.branch})`; }
  }
  tip.innerHTML = `<div class="font-semibold text-white mb-0.5"></div><div class="text-slate-400 mono mb-1"></div><div class="text-slate-300"></div>`;
  const kids = tip.children;
  kids[0].textContent = head;
  kids[1].textContent = `${fmt(seg.start)}–${fmt(seg.end)} · ${dur(dl)}`;
  kids[2].style.whiteSpace='pre-line';
  kids[2].textContent = line3;
  tip.style.opacity='1';
  moveTip(x,y);
}
function moveTip(x,y){
  const r=tip.getBoundingClientRect();
  let nx=x+14, ny=y+14;
  if(nx+r.width>innerWidth-8) nx=x-r.width-14;
  if(ny+r.height>innerHeight-8) ny=y-r.height-14;
  tip.style.left=nx+'px'; tip.style.top=ny+'px';
}
function hideTip(){ tip.style.opacity='0'; }

function wireHover(){
  document.querySelectorAll('[data-jira]').forEach(el=>{
    el.addEventListener('mouseenter', ()=> setHiKey(el.dataset.jira));
    el.addEventListener('mouseleave', ()=> setHiKey(null));
  });
  document.querySelectorAll('.seg[data-tip]').forEach(el=>{
    const seg = TIP[+el.dataset.tip];
    el.addEventListener('mouseenter', e=> showTip(seg, e.clientX, e.clientY));
    el.addEventListener('mousemove', e=> moveTip(e.clientX, e.clientY));
    el.addEventListener('mouseleave', hideTip);
  });
}
function setHiKey(key){
  document.querySelectorAll('[data-jira]').forEach(el=>{
    const match = key && el.dataset.jira===key;
    el.classList.toggle('dim', !!key && !match);
    el.classList.toggle('hi', !!match);
  });
}

// classy colour wash behind everything, built from the week's busiest colours
const BG_SPOTS=[[12,16],[86,12],[80,74],[16,82],[52,42],[42,6]];
function weekPalette(week){
  const tally={};
  for(const d of week.days){
    const m=dayModel(d.date);
    const sum=daySummary(d.date, overlay(m?m.segs:[], d.date));
    for(const it of sum.items) tally[it.color]=(tally[it.color]||0)+it.mins;
  }
  return Object.entries(tally).sort((a,b)=>b[1]-a[1]).slice(0,6).map(e=>e[0]);
}
function applyBg(iso){
  const bg=document.getElementById('bg'); if(!bg) return;
  const week=DATA.weeks.find(w=>w.iso===iso);
  const cols=week?weekPalette(week):[];
  bg.style.backgroundImage = cols.length
    ? cols.map((c,i)=>{ const [x,y]=BG_SPOTS[i%BG_SPOTS.length]; return `radial-gradient(42% 42% at ${x}% ${y}%, ${hexA(c,0.5)} 0%, transparent 100%)`; }).join(',')
    : 'none';
}
function selectWeek(iso){ currentWeek=iso; renderTabs(); applyBg(iso); renderWeek(); renderLegend(); }
function renderLegend(){
  const jiras=[...new Set(DATA.events.map(e=>e.jira).filter(Boolean))].sort();
  let h = jiras.map(j=>`<span class="legitem flex items-center gap-1.5" data-jira="${keyOf(j)}" style="color:${colorFor(j)}">
      <span class="w-3 h-3 rounded-sm" style="background:${colorFor(j)}"></span>
      <span class="font-semibold">${j}</span><span class="text-slate-400">${nameFor(j)}</span></span>`).join('');
  h += `<span class="legitem flex items-center gap-1.5" data-jira="__none__"><span class="w-3 h-3 rounded-sm" style="background:${NOJIRA}"></span><span class="text-slate-400">no jira</span></span>`;
  if((DATA.meetings||[]).length){
    h += `<span class="legitem flex items-center gap-1.5" data-jira="__meeting__"><span class="w-3 h-3 rounded-sm" style="background:${MEETING};background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.3) 0 3px,transparent 3px 6px)"></span><span class="text-slate-400">meeting</span></span>`;
    h += `<button id="resetMtg" class="ml-auto text-[11px] text-slate-500 hover:text-slate-300 underline">reset meeting toggles</button>`;
  }
  document.getElementById('legend').innerHTML = h;
  const rb=document.getElementById('resetMtg'); if(rb) rb.onclick=resetToggles;
  wireHover();
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeModal(); });
document.getElementById('sub').textContent =
  `${DATA.window?.weeks||'?'} weeks · ${DATA.events.length} signals · ${Object.keys(DATA.lanes).length} worktrees · ${DATA.tz||''} · built ${new Date(DATA.generatedAt).toLocaleString()}`;
renderTabs(); renderAdjust(); applyBg(currentWeek); renderWeek(); renderLegend();
</script>
